<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EMS TOTAL v2.0 | Emirhan Bozdayı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* GÖRSELDEKİ "SYNCYOPATE" FONTUNU VE MODERN YAPINI TANIMLADIK */
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;800&display=swap');
        :root { --blue: #3b82f6; --dark: #020408; --card: #0b101a; }
        body { background: var(--dark); color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        .ems-glass { background: var(--card); border: 1px solid rgba(255,255,255,0.04); border-radius: 28px; transition: 0.3s; }
        .ems-input { background: #0f141f; border: 1px solid #1e293b; padding: 1.25rem; border-radius: 1.2rem; width: 100%; outline: none; font-weight: 600; color: white; }
        .ems-input:focus { border-color: var(--blue); box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
        .btn-main { background: var(--blue); padding: 1.25rem; border-radius: 1.2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; width: 100%; transition: 0.3s; }
        .tab-active { background: var(--blue) !important; color: white !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="authScreen" class="fixed inset-0 z-[999] bg-[#020408] flex items-center justify-center p-6 transition-opacity duration-500">
        <div class="ems-glass p-10 max-w-md w-full border-t-8 border-blue-600 shadow-2xl text-center">
            
            <div class="mb-10">
                <h1 style="font-family: 'Syncopate', sans-serif;" class="text-3xl font-bold tracking-tighter text-white mb-2 italic">EMS<span class="text-blue-500">POS</span></h1>
                <p class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.4em] mt-1">v2.0 İşletme Otomasyonu</p>
            </div>

            <div id="loginForm" class="space-y-4">
                <div class="relative">
                    <i class="fa-solid fa-envelope absolute left-5 top-5 text-slate-600 text-xs"></i>
                    <input type="email" id="email" placeholder="İşletme E-postası" class="ems-input pl-12">
                </div>
                
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-5 top-5 text-slate-600 text-xs"></i>
                    <input type="password" id="password" placeholder="Şifre" class="ems-input pl-12">
                </div>
                
                <div id="sectorField" class="hidden text-left space-y-1">
                    <label class="text-[10px] font-black text-slate-600 ml-1 uppercase">Sektör Seçimi</label>
                    <select id="sectorSelect" class="ems-input text-blue-400 font-bold">
                        <option value="Market">Market Modu</option>
                        <option value="Restoran">Restoran Modu</option>
                        <option value="Manav">Manav Modu</option>
                    </select>
                </div>

                <button onclick="handleAuth()" class="btn-main mt-6">Sistemi Başlat / Kaydol</button>
                <p id="toggleText" onclick="toggleMode()" class="text-center text-[10px] text-blue-500 font-bold mt-4 cursor-pointer hover:underline uppercase tracking-wider">Yeni İşletme Kaydı Yap</p>
            </div>

            <p class="mt-10 text-[9px] text-slate-700 text-center font-bold uppercase tracking-widest leading-loose">Software by Emirhan Bozdayı<br>Tüm Hakları Saklıdır © 2026</p>
        </div>
    </div>

    <div id="mainUI" class="hidden opacity-0 transition-opacity duration-700">
        <header class="flex justify-between items-center mb-6 px-2">
            <div>
                <h2 style="font-family: 'Syncopate';" class="text-lg font-bold italic tracking-tighter">EMS<span class="text-blue-500" id="headerSector">TOTAL</span></h2>
                <p id="infoDisplay" class="text-[8px] font-black text-slate-500 uppercase tracking-widest mt-1"></p>
            </div>
            <div class="text-right">
                <p id="clock" class="text-xl font-black text-white">00:00</p>
                <button onclick="logout()" class="text-[10px] text-red-500 font-bold uppercase underline">Oturumu Kapat</button>
            </div>
        </header>

        <nav class="grid grid-cols-4 gap-2 mb-8">
            <button onclick="tab('kasa')" id="n-kasa" class="ems-glass p-4 flex flex-col items-center gap-2 tab-active"><i class="fa-solid fa-cash-register"></i><span class="text-[8px] font-bold uppercase">Kasa</span></button>
            <button onclick="tab('masa')" id="n-masa" class="ems-glass p-4 flex flex-col items-center gap-2 text-slate-600"><i class="fa-solid fa-table-cells"></i><span class="text-[8px] font-bold uppercase">Masa</span></button>
            <button onclick="tab('stok')" id="n-stok" class="ems-glass p-4 flex flex-col items-center gap-2 text-slate-600"><i class="fa-solid fa-box"></i><span class="text-[8px] font-bold uppercase">Stok</span></button>
            <button onclick="tab('cari')" id="n-cari" class="ems-glass p-4 flex flex-col items-center gap-2 text-slate-600"><i class="fa-solid fa-users"></i><span class="text-[8px] font-bold uppercase">Cari</span></button>
        </nav>
        
        <main id="v-kasa" class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-7">
                <div class="ems-glass p-2 overflow-hidden border border-blue-500/10 mb-4 shadow-2xl"><div id="qr-reader"></div></div>
                <div class="flex gap-2">
                    <input id="barcodeIn" type="text" placeholder="Barkod Okutun..." class="ems-input text-xl flex-grow">
                    <button onclick="manualAdd()" class="bg-blue-600 px-10 rounded-2xl font-black text-xs">EKLE</button>
                </div>
            </div>
            <div class="lg:col-span-5 ems-glass p-8 flex flex-col h-[550px] border-t-8 border-blue-600">
                <div id="cart" class="flex-grow overflow-y-auto space-y-3"></div>
                <div class="pt-6 border-t border-slate-800 mt-4">
                    <div class="flex justify-between items-center mb-6 font-black"><span class="text-slate-500 text-[10px] uppercase">Toplam</span><span id="totalVal" class="text-4xl text-green-400">₺0.00</span></div>
                    <button onclick="pay()" class="btn-main bg-emerald-600">Satışı Tamamla</button>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-YOUR-KEY",
            authDomain: "ems-pos-b6c2c.firebaseapp.com",
            projectId: "ems-pos-b6c2c",
            storageBucket: "ems-pos-b6c2c.appspot.com",
            messagingSenderId: "36315570077",
            appId: "1:36315570077:web:8d76d47053e1f2516666ba"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isLoginMode = true;

        window.toggleMode = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('sectorField').classList.toggle('hidden');
            document.getElementById('toggleText').innerText = isLoginMode ? 'Yeni İşletme Kaydı Yap' : 'Zaten hesabım var, Giriş Yap';
        };

        // --- EMİRHAN BOZDAYI LİSANS VE ONAY MANTIĞI ---
        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const sector = document.getElementById('sectorSelect').value;

            try {
                if(isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "isletmeler", res.user.uid), {
                        email, sector, onay: false, tarih: new Date()
                    });
                    alert("Kayıt Alındı! Emirhan Bozdayı tarafından onaylanmanız gerekmektedir.");
                    await signOut(auth);
                }
            } catch (err) {
                // Görseldeki "invalid-login" hatasının asıl çözümü
                if(err.code === 'auth/invalid-credential') alert("Giriş Hatası: Firebase: Error (auth/invalid-login-credentials).");
                else alert("Hata: " + err.message);
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "isletmeler", user.uid));
                if(snap.exists() && snap.data().onay === true) {
                    document.getElementById('authScreen').classList.add('hidden');
                    document.getElementById('mainUI').classList.remove('hidden');
                    setTimeout(() => document.getElementById('mainUI').style.opacity = "1", 50);
                    document.getElementById('infoDisplay').innerText = `İŞLETME: ${user.email} | DURUM: AKTİF`;
                    document.getElementById('headerSector').innerText = snap.data().sector.toUpperCase();
                    startScanner();
                } else {
                    alert("Lisans Geçersiz: Emirhan Bozdayı onayı bekleniyor.");
                    await signOut(auth);
                }
            } else {
                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('mainUI').classList.add('hidden');
            }
        });

        window.logout = () => signOut(auth);

        // BARKOD SİSTEMİ
        let scanner = new Html5Qrcode("qr-reader");
        function startScanner() {
            scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (text) => {
                document.getElementById('barcodeIn').value = text;
                manualAdd();
            });
        }

        window.manualAdd = async () => {
            const b = document.getElementById('barcodeIn').value;
            const snap = await getDoc(doc(db, "urunler", b));
            if(snap.exists()) {
                const i = snap.data();
                const div = document.createElement('div');
                div.className = 'ems-glass p-4 flex justify-between border-l-4 border-blue-500';
                div.innerHTML = `<span class="text-[10px] font-black uppercase">${i.ad}</span><span class="text-blue-400 font-black">₺${i.fiyat}</span>`;
                document.getElementById('cart').appendChild(div);
                updateTotal(i.fiyat);
            }
            document.getElementById('barcodeIn').value = "";
        };

        let currentTotal = 0;
        function updateTotal(p) { currentTotal += parseFloat(p); document.getElementById('totalVal').innerText = "₺" + currentTotal.toFixed(2); }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'}); }, 1000);
    </script>
</body>
</html>
