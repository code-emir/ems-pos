<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EMS TOTAL | Emirhan Bozdayı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;600;800&display=swap');
        :root { --blue: #3b82f6; --dark: #05070a; --card: #0f1218; --green: #10b981; }
        body { background: var(--dark); color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .ems-glass { background: var(--card); border: 1px solid rgba(255,255,255,0.03); border-radius: 28px; transition: 0.3s; }
        .neon-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); }
        .active-tab { background: var(--blue) !important; color: white !important; box-shadow: 0 10px 25px rgba(59,130,246,0.3); }
        input:focus { border-color: var(--blue) !important; outline: none; background: #161b24; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="p-3 md:p-6">

    <div id="masterOverlay" class="fixed inset-0 z-[1000] bg-black flex items-center justify-center p-6">
        <div class="ems-glass p-10 max-w-4xl w-full text-center border-t-8 border-blue-600 shadow-[0_0_100px_rgba(59,130,246,0.1)]">
            <h1 style="font-family: 'Syncopate';" class="text-4xl font-bold tracking-tighter mb-4 text-white">EMS<span class="text-blue-500 underline">TOTAL</span></h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.5em] mb-12 italic">Master Integrated Systems</p>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                <button onclick="setSector('Market')" class="ems-glass p-8 hover:border-blue-500 transition group">
                    <i class="fa-solid fa-barcode text-3xl text-blue-500 mb-4 group-hover:scale-110 transition"></i>
                    <h3 class="font-black text-sm">MARKET MODU</h3>
                </button>
                <button onclick="setSector('Restoran')" class="ems-glass p-8 hover:border-orange-500 transition group">
                    <i class="fa-solid fa-utensils text-3xl text-orange-500 mb-4 group-hover:scale-110 transition"></i>
                    <h3 class="font-black text-sm">RESTORAN MODU</h3>
                </button>
                <button onclick="setSector('Manav')" class="ems-glass p-8 hover:border-green-500 transition group">
                    <i class="fa-solid fa-weight-hanging text-3xl text-green-500 mb-4 group-hover:scale-110 transition"></i>
                    <h3 class="font-black text-sm">MANAV MODU</h3>
                </button>
            </div>

            <div class="flex flex-col items-center gap-4">
                <input type="password" id="masterKey" placeholder="Yönetici Onay Kodu" class="bg-slate-900 border border-slate-800 p-5 rounded-2xl text-center font-black tracking-widest text-blue-500 w-64 outline-none">
                <button onclick="unlockSystem()" class="bg-blue-600 px-12 py-5 rounded-2xl font-black text-xs tracking-widest hover:brightness-110">SİSTEMİ KİLİTLE/AÇ</button>
            </div>
        </div>
    </div>

    <div id="appBody" class="hidden opacity-0 transition-opacity duration-1000">
        <header class="flex justify-between items-center mb-6 px-4">
            <div>
                <h2 style="font-family: 'Syncopate';" class="text-xl font-bold tracking-tighter italic">EMS<span id="sectorLabel" class="text-blue-500">POS</span></h2>
                <div class="flex items-center gap-2"><span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span><p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Kadirli Yerel Ağ: AKTİF</p></div>
            </div>
            <div class="text-right">
                <p id="liveClock" class="text-2xl font-black text-white">00:00:00</p>
                <p class="text-[9px] font-bold text-blue-400 uppercase">Emirhan Bozdayı | 2026</p>
            </div>
        </header>

        <nav class="grid grid-cols-5 gap-2 mb-8">
            <button onclick="view('kasa')" id="n-kasa" class="ems-glass p-4 flex flex-col items-center gap-2 active-tab"><i class="fa-solid fa-cash-register"></i><span class="text-[9px] font-bold uppercase">Kasa</span></button>
            <button onclick="view('masa')" id="n-masa" class="ems-glass p-4 flex flex-col items-center gap-2 text-slate-600"><i class="fa-solid fa-table-list"></i><span class="text-[9px] font-bold uppercase">Masa</span></button>
            <button onclick="view('veresiye')" id="n-veresiye" class="ems-glass p-4 flex flex-col items-center gap-2 text-slate-600"><i class="fa-solid fa-address-card"></i><span class="text-[9px] font-bold uppercase">Cari</span></button>
            <button onclick="view('stok')" id="n-stok" class="ems-glass p-4 flex flex-col items-center gap-2 text-slate-600"><i class="fa-solid fa-boxes-stacked"></i><span class="text-[9px] font-bold uppercase">ByStok</span></button>
            <button onclick="view('rapor')" id="n-rapor" class="ems-glass p-4 flex flex-col items-center gap-2 text-slate-600"><i class="fa-solid fa-chart-pie"></i><span class="text-[9px] font-bold uppercase">Rapor</span></button>
        </nav>

        <main>
            <div id="v-kasa" class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-7 space-y-4">
                    <div class="ems-glass p-2 neon-glow overflow-hidden"><div id="reader"></div></div>
                    <div class="flex gap-2">
                        <input id="mainIn" type="text" placeholder="Barkod Okutun..." class="flex-grow bg-slate-900 p-6 rounded-3xl border border-slate-800 font-bold text-xl text-white outline-none">
                        <button onclick="handleScan()" class="bg-blue-600 px-10 rounded-3xl font-black text-xs active:scale-95 transition">OKUT</button>
                    </div>
                    <div id="fastBtns" class="grid grid-cols-4 gap-2"></div>
                </div>
                <div class="lg:col-span-5 ems-glass p-8 flex flex-col h-[600px] border-t-8 border-blue-600">
                    <div class="flex justify-between items-center mb-6"><h3 class="font-black italic">İŞLEM LİSTESİ</h3><button onclick="window.cart=[];renderCart();" class="text-red-500 text-[10px] font-bold uppercase underline">Temizle</button></div>
                    <div id="cartList" class="flex-grow overflow-y-auto space-y-3 custom-scroll pr-2"></div>
                    <div class="mt-6 pt-6 border-t border-slate-800">
                        <div class="flex justify-between items-end mb-6 font-black"><span class="text-slate-500 text-[10px]">TOPLAM</span><span id="totalTxt" class="text-4xl text-green-400 tracking-tighter">₺0.00</span></div>
                        <div class="grid grid-cols-2 gap-2 mb-2">
                            <button onclick="pay('Nakit')" class="bg-emerald-600 p-4 rounded-2xl font-black text-xs shadow-lg">NAKİT</button>
                            <button onclick="pay('Kart')" class="bg-sky-600 p-4 rounded-2xl font-black text-xs shadow-lg">KART</button>
                        </div>
                        <button onclick="pay('Veresiye')" class="w-full bg-orange-600 p-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg">Veresiye Kaydet</button>
                    </div>
                </div>
            </div>

            <div id="v-masa" class="hidden grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>

            <div id="v-stok" class="hidden max-w-2xl mx-auto space-y-6">
                <div class="ems-glass p-8 border-b-8 border-blue-600">
                    <h3 class="text-2xl font-black mb-6 italic">BySTOK ÜRÜN YÖNETİMİ</h3>
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <label class="ems-glass p-6 flex flex-col items-center gap-3 cursor-pointer border-dashed border-2 border-slate-700 hover:border-blue-500">
                            <i class="fa-solid fa-file-excel text-green-500 text-2xl"></i>
                            <span class="text-[10px] font-bold">EXCEL'DEN AKTAR</span>
                            <input type="file" id="excelIn" class="hidden" accept=".xlsx, .xls">
                        </label>
                        <button onclick="exportStok()" class="ems-glass p-6 flex flex-col items-center gap-3 hover:border-blue-500">
                            <i class="fa-solid fa-file-export text-blue-500 text-2xl"></i>
                            <span class="text-[10px] font-bold">STOK YEDEKLE (EXCEL)</span>
                        </button>
                    </div>
                    <div class="space-y-3">
                        <input type="text" id="sName" placeholder="Ürün Adı" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-800 font-bold outline-none">
                        <input type="number" id="sPrice" placeholder="Fiyat" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-800 font-bold text-green-400 outline-none">
                        <button onclick="saveProduct()" class="w-full bg-blue-600 p-5 rounded-xl font-black text-lg shadow-xl">MANUEL EKLE</button>
                    </div>
                </div>
            </div>

            <div id="v-rapor" class="hidden space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="ems-glass p-6 text-center"><p class="text-[10px] font-bold text-slate-500 mb-2">GÜNLÜK CİRO</p><h4 class="text-3xl font-black text-green-400">₺14.250</h4></div>
                    <div id="sectorStat" class="ems-glass p-6 text-center"><p class="text-[10px] font-bold text-slate-500 mb-2">İŞLETME TÜRÜ</p><h4 class="text-3xl font-black text-blue-500">-</h4></div>
                    <div class="ems-glass p-6 text-center"><p class="text-[10px] font-bold text-slate-500 mb-2">TOPLAM FİŞ</p><h4 class="text-3xl font-black text-white">124</h4></div>
                </div>
                <div class="ems-glass p-8 h-[400px] flex items-center justify-center">
                    <canvas id="salesChart"></canvas>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDoc, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const fbCfg = {
            apiKey: "AIzaSyD-KEY",
            authDomain: "ems-pos-b6c2c.firebaseapp.com",
            projectId: "ems-pos-b6c2c",
            storageBucket: "ems-pos-b6c2c.appspot.com",
            messagingSenderId: "36315570077",
            appId: "1:36315570077:web:8d76d47053e1f2516666ba"
        };

        const app = initializeApp(fbCfg);
        const db = getFirestore(app);
        window.cart = [];
        window.sector = "";

        // AUTH & SECTOR
        window.setSector = (s) => { window.sector = s; document.querySelectorAll('#masterOverlay button').forEach(b => b.classList.remove('border-blue-500')); };
        window.unlockSystem = () => {
            if(!window.sector) return alert("Sektör seçmedin gardaşım!");
            if(document.getElementById('masterKey').value === "8080") {
                document.getElementById('masterOverlay').classList.add('hidden');
                document.getElementById('appBody').classList.remove('hidden');
                setTimeout(() => document.getElementById('appBody').style.opacity = "1", 50);
                document.getElementById('sectorLabel').innerText = window.sector.toUpperCase();
                document.getElementById('sectorStat').querySelector('h4').innerText = window.sector;
                initSectorFeatures();
                startScanner();
            } else { alert("Yanlış Şifre!"); }
        };

        function initSectorFeatures() {
            const f = document.getElementById('fastBtns'); f.innerHTML = "";
            if(window.sector === 'Market') { f.innerHTML = `<button onclick="fast('Ekmek',10)" class="ems-glass p-4 text-[10px] font-black border-l-4 border-yellow-500">EKMEK</button><button onclick="fast('Poşet',0.25)" class="ems-glass p-4 text-[10px] font-black border-l-4 border-blue-500">POŞET</button>`; }
            if(window.sector === 'Restoran') { view('masa'); drawTables(); }
            if(window.sector === 'Manav') { f.innerHTML = `<button onclick="fast('Karton',5)" class="ems-glass p-4 text-[10px] font-black border-l-4 border-green-500">KARTON</button>`; }
        }

        // BARKOD & TERAZİ ENGINE
        let scanner;
        function startScanner() {
            scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (text) => {
                document.getElementById('mainIn').value = text;
                handleScan();
            });
        }

        window.handleScan = async () => {
            const b = document.getElementById('mainIn').value;
            if(!b) return;
            // Manav/Terazi Algoritması (27 ile başlayan 13 hane)
            if(b.startsWith('27') && b.length === 13) {
                const code = b.substring(2,7);
                const weight = parseFloat(b.substring(7,12)) / 1000;
                const snap = await getDoc(doc(db, "urunler", code));
                if(snap.exists()) { const d = snap.data(); window.cart.push({ n: d.ad, f: d.fiyat * weight, q: weight.toFixed(3)+"kg" }); }
            } else {
                const snap = await getDoc(doc(db, "urunler", b));
                if(snap.exists()) { const d = snap.data(); window.cart.push({ n: d.ad, f: d.fiyat, q: "1 Adet" }); }
                else { alert("Kayıt yok!"); }
            }
            renderCart(); document.getElementById('mainIn').value = "";
        };

        window.renderCart = () => {
            const list = document.getElementById('cartList'); list.innerHTML = "";
            let t = 0;
            window.cart.forEach(i => { t += i.f; list.innerHTML += `<div class="ems-glass p-4 flex justify-between items-center border-l-4 border-blue-600"><div><p class="font-black text-[11px]">${i.n}</p><p class="text-[9px] text-slate-500 font-bold">${i.q}</p></div><p class="font-black text-blue-400">₺${i.f.toFixed(2)}</p></div>`; });
            document.getElementById('totalTxt').innerText = "₺" + t.toFixed(2);
        };

        // EXCEL ENTEGRASYONU (BySTOK)
        document.getElementById('excelIn').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(sheet);
                json.forEach(async (row) => {
                    await setDoc(doc(db, "urunler", String(row.Barkod)), { ad: row.Ad, fiyat: Number(row.Fiyat) });
                });
                alert("Excel başarıyla aktarıldı!");
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        window.exportStok = async () => {
            const snap = await getDocs(collection(db, "urunler"));
            const data = snap.docs.map(d => ({ Barkod: d.id, ...d.data() }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Stok");
            XLSX.writeFile(wb, "EMS_Stok_Yedek.xlsx");
        };

        // DİĞER FONKSİYONLAR
        window.view = (id) => {
            ['kasa', 'masa', 'veresiye', 'stok', 'rapor'].forEach(v => { 
                document.getElementById(`v-${v}`).classList.add('hidden'); 
                document.getElementById(`n-${v}`).classList.replace('active-tab', 'text-slate-600'); 
            });
            document.getElementById(`v-${id}`).classList.remove('hidden');
            document.getElementById(`n-${id}`).classList.replace('text-slate-600', 'active-tab');
            if(id === 'rapor') initChart();
        };

        window.drawTables = () => {
            const g = document.getElementById('v-masa'); g.innerHTML = "";
            for(let i=1; i<=18; i++) g.innerHTML += `<div class="ems-glass p-8 flex flex-col items-center gap-2 cursor-pointer hover:border-orange-500"><span class="text-[9px] font-bold opacity-30 italic">MASA</span><span class="text-2xl font-black">${i}</span><span class="text-[9px] text-emerald-500 font-bold">BOŞ</span></div>`;
        };

        window.fast = (n,p) => { window.cart.push({ n, f:p, q:"1 Adet" }); renderCart(); };
        window.pay = (m) => { if(window.cart.length>0) { alert(m + " Tamamlandı!"); window.cart=[]; renderCart(); } };

        function initChart() {
            const ctx = document.getElementById('salesChart').getContext('2d');
            new Chart(ctx, { type: 'line', data: { labels: ['Pzt', 'Sal', 'Çar', 'Per', 'Cum', 'Cmt', 'Paz'], datasets: [{ label: 'Satışlar (₺)', data: [1200, 1900, 3000, 5000, 2000, 3000, 4500], borderColor: '#3b82f6', tension: 0.4 }] }, options: { maintainAspectRatio: false, scales: { y: { grid: { color: '#1e293b' } } } } });
        }

        setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);
    </script>
</body>
</html>
