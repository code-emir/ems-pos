<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EMS POS | ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@400;800&display=swap');
        :root { --blue: #3b82f6; --dark: #07090e; --card: #11141b; }
        body { background: var(--dark); color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; }
        .ems-glass { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 30px; }
        .ems-btn { background: var(--blue); box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4); transition: all 0.2s; }
        .ems-btn:active { transform: scale(0.95); }
        .active-tab { background: var(--blue) !important; color: white !important; }
        #reader { border-radius: 25px; overflow: hidden; border: 2px solid #1e293b !important; }
        .neon-border { border: 1px solid rgba(59, 130, 246, 0.3); box-shadow: 0 0 20px rgba(59, 130, 246, 0.1); }
        input:focus { border-color: var(--blue) !important; outline: none; }
    </style>
</head>
<body class="p-3 md:p-8">

    <div id="authScreen" class="fixed inset-0 z-[999] bg-black flex items-center justify-center p-6">
        <div class="ems-glass p-12 max-w-md w-full text-center border-t-8 border-blue-600">
            <h1 style="font-family: 'Syncopate', sans-serif;" class="text-4xl font-bold tracking-tighter text-white mb-2">EMS<span class="text-blue-500">POS</span></h1>
            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.5em] mb-10 italic">Secure Business Management</p>
            <input type="password" id="sysPass" placeholder="GİRİŞ ŞİFRESİ" class="w-full bg-slate-900/50 p-6 rounded-3xl border border-slate-800 text-center font-black text-2xl tracking-widest mb-4 text-blue-500">
            <button onclick="unlockSystem()" class="w-full ems-btn p-6 rounded-3xl font-black text-xs tracking-[0.2em]">SİSTEMİ ONAYLA</button>
            <p class="mt-8 text-[9px] text-slate-700 font-bold uppercase tracking-widest leading-loose">Developer: Emirhan Bozdayı<br>Osmaniye / Kadirli</p>
        </div>
    </div>

    <div id="mainApp" class="hidden opacity-0 transition-opacity duration-1000">
        <header class="flex justify-between items-center mb-8 px-4">
            <div>
                <h2 style="font-family: 'Syncopate', sans-serif;" class="text-2xl font-bold tracking-tighter italic">EMS<span class="text-blue-500">POS</span></h2>
                <div class="flex items-center gap-2 mt-1">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <p class="text-[9px] font-black text-blue-400/70 uppercase tracking-widest">Server: Kadirli-01</p>
                </div>
            </div>
            <div class="text-right">
                <p id="timer" class="text-2xl font-black text-white leading-none">00:00</p>
                <p class="text-[9px] font-bold text-slate-600 uppercase tracking-widest mt-1">6 Mayıs 2026</p>
            </div>
        </header>

        <nav class="grid grid-cols-4 gap-3 mb-8">
            <button onclick="setView('sale')" id="t-sale" class="ems-glass p-5 flex flex-col items-center gap-2 active-tab transition-all"><i class="fa-solid fa-cash-register text-lg"></i><span class="text-[9px] font-black uppercase">Kasa</span></button>
            <button onclick="setView('tables')" id="t-tables" class="ems-glass p-5 flex flex-col items-center gap-2 text-slate-500 transition-all"><i class="fa-solid fa-utensils text-lg"></i><span class="text-[9px] font-black uppercase">Masa</span></button>
            <button onclick="setView('ledger')" id="t-ledger" class="ems-glass p-5 flex flex-col items-center gap-2 text-slate-500 transition-all"><i class="fa-solid fa-address-book text-lg"></i><span class="text-[9px] font-black uppercase">Cari</span></button>
            <button onclick="setView('stock')" id="t-stock" class="ems-glass p-5 flex flex-col items-center gap-2 text-slate-500 transition-all"><i class="fa-solid fa-box text-lg"></i><span class="text-[9px] font-black uppercase">Stok</span></button>
        </nav>

        <main>
            <div id="v-sale" class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-7">
                    <div class="ems-glass p-2 mb-6 neon-border overflow-hidden"><div id="scanner"></div></div>
                    <div class="flex gap-2">
                        <input id="inputBar" type="text" placeholder="Barkod Okutun..." class="flex-grow bg-slate-900 p-6 rounded-[25px] border border-slate-800 font-bold text-xl outline-none focus:border-blue-500 transition-all">
                        <button onclick="addItem()" class="ems-btn px-10 rounded-[25px] font-black text-xs tracking-widest">EKLE</button>
                    </div>
                </div>
                <div class="lg:col-span-5 ems-glass p-8 flex flex-col h-[600px] border-t-8 border-blue-600 shadow-2xl relative">
                    <h3 class="text-xl font-black italic mb-8">SATIŞ LİSTESİ</h3>
                    <div id="cartBody" class="flex-grow overflow-y-auto space-y-4 pr-2"></div>
                    <div class="mt-8 pt-8 border-t border-slate-800/50">
                        <div class="flex justify-between items-end mb-8 text-green-400 font-black"><span class="text-slate-500 text-[10px] uppercase tracking-widest">TOPLAM TUTAR</span><span id="grandTotal" class="text-5xl tracking-tighter">₺0.00</span></div>
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <button onclick="finish('Nakit')" class="bg-emerald-600 p-5 rounded-2xl font-black text-xs shadow-lg">NAKİT</button>
                            <button onclick="finish('Kart')" class="bg-sky-600 p-5 rounded-2xl font-black text-xs shadow-lg">KART</button>
                        </div>
                        <button onclick="finish('Veresiye')" class="w-full bg-orange-600 p-5 rounded-2xl font-black text-[10px] uppercase tracking-[0.3em] shadow-lg">Veresiye Kaydet</button>
                    </div>
                </div>
            </div>

            <div id="v-tables" class="hidden grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>

            <div id="v-stock" class="hidden max-w-xl mx-auto ems-glass p-10 border-b-8 border-blue-600">
                <h3 class="text-2xl font-black mb-8 text-center italic">YENİ ÜRÜN TANIMLA</h3>
                <div class="space-y-4">
                    <input type="text" id="pName" placeholder="Ürün Adı" class="w-full bg-slate-900 p-5 rounded-2xl border border-slate-800 font-bold outline-none">
                    <input type="number" id="pPrice" placeholder="Satış Fiyatı (₺)" class="w-full bg-slate-900 p-5 rounded-2xl border border-slate-800 text-green-400 font-black text-2xl outline-none">
                    <button onclick="saveProduct()" class="w-full ems-btn p-6 rounded-2xl font-black text-lg shadow-xl mt-4">VERİTABANINA YAZ</button>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDoc, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-YOUR_KEY_HERE", // Kendi Key'ini buraya koy gardaşım
            authDomain: "ems-pos-b6c2c.firebaseapp.com",
            projectId: "ems-pos-b6c2c",
            storageBucket: "ems-pos-b6c2c.appspot.com",
            messagingSenderId: "36315570077",
            appId: "1:36315570077:web:8d76d47053e1f2516666ba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.cart = [];

        // SİSTEMİ AÇ
        window.unlockSystem = () => {
            if(document.getElementById('sysPass').value === "8080") {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                setTimeout(() => document.getElementById('mainApp').style.opacity = "1", 100);
                startScanner();
            } else { alert("Şifre Yanlış!"); }
        };

        // SAAT & NAV
        setInterval(() => { document.getElementById('timer').innerText = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'}); }, 1000);
        window.setView = (id) => {
            ['sale', 'tables', 'ledger', 'stock'].forEach(v => {
                document.getElementById(`v-${v}`).classList.add('hidden');
                document.getElementById(`t-${v}`).classList.remove('active-tab');
                document.getElementById(`t-${v}`).classList.add('text-slate-500');
            });
            document.getElementById(`v-${id}`).classList.remove('hidden');
            document.getElementById(`t-${id}`).classList.add('active-tab', 'text-white');
            if(id === 'tables') drawTables();
        };

        // BARKOD
        const startScanner = () => {
            const html5QrCode = new Html5Qrcode("scanner");
            html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (text) => {
                document.getElementById('inputBar').value = text;
                addItem();
            });
        };

        window.addItem = async () => {
            const b = document.getElementById('inputBar').value;
            if(!b) return;
            const snap = await getDoc(doc(db, "urunler", b));
            if(snap.exists()) {
                const d = snap.data();
                window.cart.push({ n: d.ad, f: d.fiyat });
                render();
            } else { alert("Ürün bulunamadı!"); }
            document.getElementById('inputBar').value = "";
        };

        window.render = () => {
            const body = document.getElementById('cartBody');
            body.innerHTML = "";
            let t = 0;
            window.cart.forEach(i => {
                t += i.f;
                body.innerHTML += `<div class="ems-glass p-5 flex justify-between items-center border-l-4 border-blue-600 animate-fade-in"><span class="font-black text-xs uppercase tracking-tighter">${i.n}</span><span class="font-black text-blue-400">₺${i.f.toFixed(2)}</span></div>`;
            });
            document.getElementById('grandTotal').innerText = "₺" + t.toFixed(2);
        };

        window.finish = (m) => { if(window.cart.length > 0) { alert(`${m} İLE SATIŞ TAMAMLANDI!`); window.cart = []; render(); } };

        window.drawTables = () => {
            const grid = document.getElementById('v-tables');
            grid.innerHTML = "";
            for(let i=1; i<=12; i++) {
                grid.innerHTML += `<div class="ems-glass p-10 flex flex-col items-center gap-2 cursor-pointer hover:border-blue-500 transition-all"><span class="text-[9px] font-black opacity-40 uppercase italic tracking-widest">Masa</span><span class="text-2xl font-black">${i}</span><span class="text-[9px] font-bold text-emerald-500">BOŞ</span></div>`;
            }
        };

        window.saveProduct = async () => {
            const n = document.getElementById('pName').value;
            const p = document.getElementById('pPrice').value;
            const b = prompt("Barkod Okutun veya Yazın:");
            if(!n || !p || !b) return alert("Eksik veri!");
            await setDoc(doc(db, "urunler", b), { ad: n, fiyat: Number(p) });
            alert("Ürün Sisteme İşlendi!");
            setView('sale');
        };

    </script>
</body>
</html>
