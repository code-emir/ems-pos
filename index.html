<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EMS TOTAL v2.0 | Emirhan Bozdayı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;800&display=swap');
        :root { --blue: #3b82f6; --dark: #020408; --card: #0b101a; }
        body { background: var(--dark); color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; }
        .ems-glass { background: var(--card); border: 1px solid rgba(255,255,255,0.04); border-radius: 28px; }
        .ems-input { background: #0f141f; border: 1px solid #1e293b; padding: 1.25rem; border-radius: 1.2rem; width: 100%; outline: none; font-weight: 600; color: white; transition: 0.3s; }
        .ems-input:focus { border-color: var(--blue); box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
        .btn-main { background: var(--blue); padding: 1.25rem; border-radius: 1.2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; width: 100%; transition: 0.3s; box-shadow: 0 10px 30px rgba(59,130,246,0.2); }
        .tab-active { background: var(--blue) !important; color: white !important; }
        .copyright-bar { border-top: 1px solid rgba(255,255,255,0.03); padding-top: 1.5rem; margin-top: 2rem; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="authScreen" class="fixed inset-0 z-[999] bg-[#020408] flex items-center justify-center p-6">
        <div class="ems-glass p-10 max-w-md w-full border-t-8 border-blue-600 shadow-2xl text-center">
            <h1 style="font-family: 'Syncopate';" class="text-3xl font-bold tracking-tighter text-white mb-2 italic">EMS<span class="text-blue-500">POS</span></h1>
            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.4em] mb-12">Kadirli İşletme Otomasyonu</p>
            
            <div class="space-y-4">
                <input type="email" id="email" placeholder="İşletme E-postası" class="ems-input">
                <input type="password" id="password" placeholder="Şifre" class="ems-input">
                
                <div class="text-left space-y-1">
                    <label class="text-[10px] font-black text-slate-600 ml-1 uppercase">Sektör (Kayıt İçin)</label>
                    <select id="sector" class="ems-input text-blue-400 font-bold">
                        <option value="Market">Market Modu</option>
                        <option value="Restoran">Restoran Modu</option>
                        <option value="Manav">Manav Modu</option>
                    </select>
                </div>

                <button onclick="handleAuth()" class="btn-main mt-6">Sistemi Başlat</button>
            </div>

            <div class="copyright-bar">
                <p class="text-[9px] text-slate-600 font-bold uppercase tracking-[0.2em] leading-relaxed">
                    Software by Emirhan Bozdayı<br>
                    <span class="text-slate-700">Tüm Hakları Saklıdır © 2026</span>
                </p>
            </div>
        </div>
    </div>

    <div id="mainUI" class="hidden opacity-0 transition-opacity duration-1000">
        <header class="flex justify-between items-center mb-8 px-2">
            <div>
                <h2 style="font-family: 'Syncopate';" class="text-xl font-bold italic">EMS<span class="text-blue-500" id="currentSector">TOTAL</span></h2>
                <div class="flex items-center gap-2 mt-1">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <p id="userMail" class="text-[9px] font-black text-slate-500 uppercase tracking-widest"></p>
                </div>
            </div>
            <div class="text-right">
                <p id="clock" class="text-2xl font-black text-white">00:00</p>
                <button onclick="logout()" class="text-[10px] text-red-500 font-bold uppercase underline">Oturumu Kapat</button>
            </div>
        </header>

        <nav class="grid grid-cols-4 gap-2 mb-8">
            <button onclick="nav('kasa')" id="n-kasa" class="ems-glass p-5 flex flex-col items-center gap-2 tab-active"><i class="fa-solid fa-cash-register"></i><span class="text-[9px] font-black uppercase">Kasa</span></button>
            <button onclick="nav('masa')" id="n-masa" class="ems-glass p-5 flex flex-col items-center gap-2 text-slate-600"><i class="fa-solid fa-table-cells"></i><span class="text-[9px] font-black uppercase">Masa</span></button>
            <button onclick="nav('stok')" id="n-stok" class="ems-glass p-5 flex flex-col items-center gap-2 text-slate-600"><i class="fa-solid fa-box"></i><span class="text-[9px] font-black uppercase">Stok</span></button>
            <button onclick="nav('cari')" id="n-cari" class="ems-glass p-5 flex flex-col items-center gap-2 text-slate-600"><i class="fa-solid fa-users"></i><span class="text-[9px] font-black uppercase">Cari</span></button>
        </nav>

        <main id="v-kasa" class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-7">
                <div class="ems-glass p-2 border border-blue-500/10 mb-6 overflow-hidden"><div id="reader"></div></div>
                <div class="flex gap-2">
                    <input id="barcode" type="text" placeholder="Barkod Okutun..." class="ems-input text-xl flex-grow">
                    <button onclick="addItem()" class="bg-blue-600 px-10 rounded-2xl font-black text-xs">EKLE</button>
                </div>
            </div>
            <div class="lg:col-span-5 ems-glass p-8 flex flex-col h-[550px] border-t-8 border-blue-600">
                <div id="cart" class="flex-grow overflow-y-auto space-y-3"></div>
                <div class="pt-6 border-t border-slate-800 mt-4">
                    <div class="flex justify-between items-end mb-6 font-black"><span class="text-slate-500 text-[10px] uppercase">Toplam</span><span id="total" class="text-4xl text-green-400">₺0.00</span></div>
                    <button onclick="alert('Satış Başarılı!')" class="btn-main bg-emerald-600">Satışı Tamamla</button>
                </div>
            </div>
        </main>

        <footer class="mt-12 text-center opacity-30">
            <p class="text-[10px] font-bold uppercase tracking-[0.3em]">Software by Emirhan Bozdayı - Tüm Hakları Saklıdır</p>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-KEY-BURAYA",
            authDomain: "ems-pos-b6c2c.firebaseapp.com",
            projectId: "ems-pos-b6c2c",
            storageBucket: "ems-pos-b6c2c.appspot.com",
            messagingSenderId: "36315570077",
            appId: "1:36315570077:web:8d76d47053e1f2516666ba"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- EMİRHAN BOZDAYI ONAY MANTIĞI ---
        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const sector = document.getElementById('sector').value;

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                if(error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "isletmeler", res.user.uid), {
                        email, sector, onay: false, tarih: new Date()
                    });
                    alert("Kayıt Alındı! Emirhan Bozdayı tarafından onay bekleniyor.");
                    await signOut(auth);
                } else { alert("Hata: " + error.message); }
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "isletmeler", user.uid));
                if(snap.exists() && snap.data().onay === true) {
                    document.getElementById('authScreen').classList.add('hidden');
                    document.getElementById('mainUI').classList.remove('hidden');
                    setTimeout(() => document.getElementById('mainUI').style.opacity = "1", 50);
                    document.getElementById('userMail').innerText = "Aktif İşletme: " + user.email;
                    document.getElementById('currentSector').innerText = snap.data().sector.toUpperCase();
                    startScanner();
                } else {
                    alert("LİSANS GEÇERSİZ: Emirhan Bozdayı onayı gerekiyor.");
                    await signOut(auth);
                }
            } else {
                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('mainUI').classList.add('hidden');
            }
        });

        window.logout = () => signOut(auth);

        let scanner = new Html5Qrcode("reader");
        function startScanner() {
            scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (text) => {
                document.getElementById('barcode').value = text;
                addItem();
            });
        }

        window.addItem = async () => {
            const b = document.getElementById('barcode').value;
            const snap = await getDoc(doc(db, "urunler", b));
            if(snap.exists()) {
                const i = snap.data();
                const div = document.createElement('div');
                div.className = 'ems-glass p-4 flex justify-between border-l-4 border-blue-500';
                div.innerHTML = `<span class="text-[10px] font-black uppercase">${i.ad}</span><span class="text-blue-400 font-black">₺${i.fiyat}</span>`;
                document.getElementById('cart').appendChild(div);
            }
            document.getElementById('barcode').value = "";
        };

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'}); }, 1000);
    </script>
</body>
</html>
