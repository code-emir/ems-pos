<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>EMS ERP - Emirhan Bozdayı</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/xlsx.full.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Syncopate&family=Plus+Jakarta+Sans&display=swap" rel="stylesheet">

<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; background:#0b0f19; color:#fff; }
.title { font-family:'Syncopate'; }
.card { background:#111827; border:1px solid #1f2937; border-radius:12px; padding:12px; }
.neon { color:#00e5ff; }
button { transition:.2s; }
button:hover { transform:scale(1.02); }
</style>

</head>
<body class="p-4">

<h1 class="title text-xl neon">EMS ERP SYSTEM</h1>
<p class="text-xs opacity-60">Software by Emirhan Bozdayı - Tüm Hakları Saklıdır</p>

<!-- LOGIN -->
<div id="auth" class="card mt-4">
  <input id="email" placeholder="Email" class="w-full p-2 bg-gray-800 mb-2">
  <input id="pass" type="password" placeholder="Şifre" class="w-full p-2 bg-gray-800 mb-2">

  <select id="sector" class="w-full p-2 bg-gray-800 mb-2">
    <option value="market">Market</option>
    <option value="restoran">Restoran</option>
    <option value="manav">Manav</option>
  </select>

  <button onclick="register()" class="bg-blue-600 w-full p-2 mb-2">Kayıt Ol</button>
  <button onclick="login()" class="bg-green-600 w-full p-2">Giriş</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div id="status" class="text-yellow-400 mb-2"></div>

  <!-- SEKTÖR -->
  <div class="card mb-3">
    <h2 class="neon">Sektör Paneli</h2>
    <div id="sectorUI"></div>
  </div>

  <!-- ÜRÜN EKLE -->
  <div class="card mb-3">
    <h2>Ürün Ekle</h2>
    <input id="pname" placeholder="Ürün Adı" class="w-full p-2 bg-gray-800 mb-1">
    <input id="pbarkod" placeholder="Barkod" class="w-full p-2 bg-gray-800 mb-1">
    <input id="pprice" placeholder="Fiyat" class="w-full p-2 bg-gray-800 mb-1">
    <button onclick="addProduct()" class="bg-blue-600 w-full p-2">Ekle</button>
  </div>

  <!-- BARKOD -->
  <div class="card mb-3">
    <h2>Barkod / Terazi</h2>
    <input id="barcode" placeholder="Barkod okut" class="w-full p-2 bg-gray-800 mb-2">
    <button onclick="scanBarcode()" class="bg-purple-600 w-full p-2">Çöz</button>
    <div id="barcodeResult" class="text-sm mt-2"></div>
  </div>

  <!-- SATIŞ -->
  <div class="card mb-3">
    <h2>Satış</h2>
    <select id="payType" class="w-full p-2 bg-gray-800 mb-2">
      <option>Nakit</option>
      <option>Kart</option>
      <option>Veresiye</option>
    </select>
    <button onclick="sale()" class="bg-green-600 w-full p-2">Satışı Tamamla</button>
  </div>

  <!-- EXCEL -->
  <div class="card mb-3">
    <h2>Excel Stok Yükle</h2>
    <input type="file" id="file" class="mb-2">
    <button onclick="uploadExcel()" class="bg-yellow-600 w-full p-2">Yükle</button>
  </div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  addDoc,
  collection
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 FIREBASE */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "ems-pos-b6c2c.firebaseapp.com",
  projectId: "ems-pos-b6c2c",
  storageBucket: "ems-pos-b6c2c.appspot.com",
  messagingSenderId: "36315570077",
  appId: "1:36315570077:web:8d76d47053e1f2516666ba"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userData = null;

/* REGISTER */
window.register = async () => {
  const email = email.value;
  const pass = pass.value;
  const sector = sector.value;

  const user = await createUserWithEmailAndPassword(auth, email, pass);

  await setDoc(doc(db, "isletmeler", user.user.uid), {
    email,
    sektor: sector,
    onay: false
  });

  alert("Kayıt oldu, onay bekleniyor");
};

/* LOGIN */
window.login = async () => {
  const user = await signInWithEmailAndPassword(auth, email.value, pass.value);

  const ref = doc(db, "isletmeler", user.user.uid);
  const snap = await getDoc(ref);

  if (!snap.exists() || !snap.data().onay) {
    status.innerText = "ONAY BEKLENİYOR";
    return;
  }

  userData = snap.data();

  auth.style.display = "none";
  appUI.style.display = "block";

  loadSector(userData.sektor);
};

/* SEKTÖR UI */
function loadSector(sektor) {
  if (sektor === "market") sectorUI.innerHTML = "🛒 Market POS Aktif";
  if (sektor === "restoran") sectorUI.innerHTML = "🍽 Masa Sistemi Aktif";
  if (sektor === "manav") sectorUI.innerHTML = "🥬 Manav Sistemi Aktif";
}

/* ÜRÜN EKLE */
window.addProduct = async () => {
  await addDoc(collection(db, "urunler"), {
    ad: pname.value,
    barkod: pbarkod.value,
    fiyat: pprice.value,
    stok: 1
  });

  alert("Eklendi");
};

/* BARKOD */
window.scanBarcode = () => {
  let code = barcode.value;

  if (code.startsWith("27") && code.length === 13) {
    let urun = code.slice(2,7);
    let kg = parseInt(code.slice(7,12))/1000;

    barcodeResult.innerHTML =
      "Ürün: " + urun + "<br>Ağırlık: " + kg + " kg";
  } else {
    barcodeResult.innerHTML = "Normal barkod";
  }
};

/* SATIŞ */
window.sale = async () => {
  await addDoc(collection(db,"satislar"), {
    toplam: 100,
    odeme: payType.value,
    tarih: new Date()
  });

  alert("Satış tamamlandı");
};

/* EXCEL */
window.uploadExcel = async () => {
  const file = document.getElementById("file").files[0];
  const data = await file.arrayBuffer();
  const wb = XLSX.read(data);
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(sheet);

  for (let i of json) {
    await addDoc(collection(db,"urunler"), i);
  }

  alert("Excel yüklendi");
};

</script>

<!-- APP ROOT -->
<script>
const appUI = document.getElementById("app");
</script>

</body>
</html>
