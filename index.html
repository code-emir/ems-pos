<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EMS POS | Emirhan Bozdayı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Inter:wght@400;900&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .ems-card { background: #0f1218; border: 1px solid rgba(255,255,255,0.03); border-radius: 28px; transition: all 0.3s ease; }
        .ems-gradient { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
        .active-btn { background: #3b82f6 !important; color: white !important; box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        .neon-text { text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        #reader { border-radius: 24px; overflow: hidden; border: 2px solid #1e293b !important; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loginOverlay" class="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-6">
        <div class="ems-card p-10 max-w-md w-full border-t-4 border-blue-600 text-center">
            <h1 class="text-4xl font-black italic tracking-tighter mb-2">EMS<span class="text-blue-500">POS</span></h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.4em] mb-8 font-bold">Güvenli Yönetim Sistemi</p>
            <div class="space-y-4">
                <input type="password" id="adminPass" placeholder="Yönetici Şifresi" class="w-full bg-slate-900 p-5 rounded-2xl border border-slate-800 outline-none focus:border-blue-500 text-center font-bold text-xl tracking-widest text-blue-400">
                <button onclick="checkAccess()" class="w-full ems-gradient p-5 rounded-2xl font-black tracking-widest hover:brightness-110 transition">SİSTEMİ ONAYLA</button>
            </div>
            <p class="mt-6 text-[9px] text-slate-700 font-bold uppercase tracking-widest leading-loose">Software by Emirhan Bozdayı<br>Osmaniye / Kadirli</p>
        </div>
    </div>

    <div id="appInterface" class="hidden opacity-0 transition-opacity duration-700">
        <header class="flex justify-between items-center mb-8 px-2">
            <div>
                <h2 class="text-2xl font-black italic text-white tracking-tighter">EMS<span class="text-blue-500">POS</span></h2>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <p id="appStatus" class="text-[9px] font-bold text-blue-400/80 uppercase tracking-widest italic">Yönetici Modu Aktif</p>
                </div>
            </div>
            <div class="text-right">
                <p id="clock" class="text-xl font-black text-white">00:00:00</p>
                <p class="text-[9px] font-bold text-slate-600 uppercase">6 Mayıs 2026</p>
            </div>
        </header>

        <nav class="grid grid-cols-4 gap-2 mb-8">
            <button onclick="tab('market')" id="n-market" class="ems-card p-4 flex flex-col items-center gap-2 active-btn"><i class="fa-solid fa-barcode text-lg"></i><span class="text-[9px] font-black uppercase">Kasa</span></button>
            <button onclick="tab('restoran')" id="n-restoran" class="ems-card p-4 flex flex-col items-center gap-2 text-slate-500"><i class="fa-solid fa-utensils text-lg"></i><span class="text-[9px] font-black uppercase">Masa</span></button>
            <button onclick="tab('cari')" id="n-cari" class="ems-card p-4 flex flex-col items-center gap-2 text-slate-500"><i class="fa-solid fa-address-book text-lg"></i><span class="text-[9px] font-black uppercase">Cari</span></button>
            <button onclick="tab('ayarlar')" id="n-ayarlar" class="ems-card p-4 flex flex-col items-center gap-2 text-slate-500"><i class="fa-solid fa-gear text-lg"></i><span class="text-[9px] font-black uppercase">Stok</span></button>
        </nav>

        <main>
            <div id="v-market" class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-7">
                    <div class="ems-card p-2 mb-4 overflow-hidden shadow-2xl border border-blue-500/10"><div id="reader"></div></div>
                    <div class="flex gap-2">
                        <input id="barInput" type="text" placeholder="Barkod veya Ağırlık..." class="flex-grow bg-slate-900 p-5 rounded-2xl border border-slate-800 font-bold outline-none focus:border-blue-500">
                        <button onclick="addFromInput()" class="bg-blue-600 px-8 rounded-2xl font-black text-xs transition active:scale-90">EKLE</button>
                    </div>
                    <div class="grid grid-cols-3 gap-2 mt-4">
                        <button onclick="fast('Ekmek', 10)" class="ems-card p-4 text-[10px] font-black border-l-4 border-yellow-600">EKMEK</button>
                        <button onclick="fast('Poşet', 0.25)" class="ems-card p-4 text-[10px] font-black border-l-4 border-blue-600">POŞET</button>
                        <button onclick="fast('Su 0.5L', 5)" class="ems-card p-4 text-[10px] font-black border-l-4 border-cyan-600">SU 0.5L</button>
                    </div>
                </div>
                <div class="lg:col-span-5 ems-card p-6 flex flex-col h-[550px] border-t-8 border-blue-600">
                    <div class="flex justify-between items-center mb-6"><h3 class="font-black italic">AKTİF SEPET</h3><span id="cCount" class="text-[9px] bg-blue-600/20 text-blue-400 px-3 py-1 rounded-full font-bold">0 Ürün</span></div>
                    <div id="cartList" class="flex-grow overflow-y-auto space-y-3 custom-scroll pr-2"></div>
                    <div class="mt-6 pt-6 border-t border-slate-800">
                        <div class="flex justify-between items-end mb-6 text-green-400 font-black"><span class="text-slate-500 text-[10px] uppercase">Toplam</span><span id="cTotal" class="text-4xl tracking-tighter">₺0.00</span></div>
                        <div class="grid grid-cols-2 gap-2 mb-2">
                            <button onclick="pay('Nakit')" class="bg-emerald-600 p-4 rounded-xl font-black text-xs shadow-lg">NAKİT</button>
                            <button onclick="pay('Kart')" class="bg-sky-600 p-4 rounded-xl font-black text-xs shadow-lg">KART</button>
                        </div>
                        <button onclick="pay('Veresiye')" class="w-full bg-orange-600 p-4 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg">Veresiye Yazdır</button>
                    </div>
                </div>
            </div>

            <div id="v-restoran" class="hidden">
                <div id="mGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
            </div>

            <div id="v-cari" class="hidden space-y-4">
                <div class="ems-card p-6 border-l-8 border-orange-500 flex justify-between items-center">
                    <div><h4 class="font-black text-xl italic">Kadirli Esnafı</h4><p class="text-[10px] text-slate-500 font-bold uppercase">Toplam Alacak: <span class="text-orange-400 font-black">₺12.450</span></p></div>
                    <button class="bg-orange-600 px-6 py-3 rounded-xl font-black text-[10px] tracking-widest">+ MÜŞTERİ EKLE</button>
                </div>
            </div>

            <div id="v-ayarlar" class="hidden max-w-lg mx-auto ems-card p-8 border-b-8 border-blue-600">
                <h3 class="text-2xl font-black mb-8 italic text-center">ÜRÜN KAYIT SİSTEMİ</h3>
                <div class="space-y-4">
                    <input type="text" id="sName" placeholder="Ürün İsmi" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-800 outline-none focus:border-blue-500 font-bold">
                    <input type="number" id="sPrice" placeholder="Fiyat (₺)" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-800 outline-none focus:border-green-500 font-black text-green-400">
                    <button onclick="saveToCloud()" class="w-full ems-gradient p-5 rounded-xl font-black text-lg shadow-xl shadow-blue-900/20 active:scale-95 transition-transform">VERİTABANINA GÖNDER</button>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDoc, doc, setDoc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-SANA_AIT_ANAHTARI_YAPISTIR",
            authDomain: "ems-pos-b6c2c.firebaseapp.com",
            projectId: "ems-pos-b6c2c",
            storageBucket: "ems-pos-b6c2c.appspot.com",
            messagingSenderId: "36315570077",
            appId: "1:36315570077:web:8d76d47053e1f2516666ba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.cart = [];

        // ONAY SİSTEMİ
        window.checkAccess = () => {
            const pass = document.getElementById('adminPass').value;
            if(pass === "8080") { // Varsayılan şifre Osmaniye plaka gibi :)
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('appInterface').classList.remove('hidden');
                setTimeout(() => document.getElementById('appInterface').style.opacity = "1", 50);
            } else { alert("Hatalı Şifre!"); }
        };

        // SAAT & TABLAR
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        window.tab = (id) => {
            ['market', 'restoran', 'cari', 'ayarlar'].forEach(v => {
                document.getElementById(`v-${v}`).classList.add('hidden');
                document.getElementById(`n-${v}`).classList.remove('active-btn');
                document.getElementById(`n-${v}`).classList.add('text-slate-500');
            });
            document.getElementById(`v-${id}`).classList.remove('hidden');
            document.getElementById(`n-${id}`).classList.add('active-btn', 'text-white');
            if(id === 'restoran') loadTables();
        };

        // BARKOD & TERAZİ (MANAV) MANTIĞI
        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
            document.getElementById('barInput').value = text;
            addFromInput();
        });

        window.addFromInput = async () => {
            const code = document.getElementById('barInput').value;
            if(!code) return;
            // Terazi Barkodu Çözme
            if(code.startsWith('27') && code.length === 13) {
                const iCode = code.substring(2, 7);
                const weight = parseFloat(code.substring(7, 12)) / 1000;
                const snap = await getDoc(doc(db, "urunler", iCode));
                if(snap.exists()) {
                    const d = snap.data();
                    window.cart.push({ ad: d.ad, f: d.fiyat * weight, q: weight.toFixed(3) + "kg" });
                }
            } else {
                const snap = await getDoc(doc(db, "urunler", code));
                if(snap.exists()) {
                    const d = snap.data();
                    window.cart.push({ ad: d.ad, f: d.fiyat, q: "1 Adet" });
                } else { alert("Ürün Kayıtlı Değil!"); }
            }
            ui();
            document.getElementById('barInput').value = "";
        };

        window.ui = () => {
            const list = document.getElementById('cartList');
            list.innerHTML = "";
            let t = 0;
            window.cart.forEach(i => {
                t += i.f;
                list.innerHTML += `<div class="ems-card p-4 flex justify-between items-center border-l-4 border-blue-600"><div><p class="font-black text-[11px] uppercase">${i.ad}</p><p class="text-[9px] text-slate-500 font-bold italic">${i.q}</p></div><p class="font-black text-blue-400">₺${i.f.toFixed(2)}</p></div>`;
            });
            document.getElementById('cTotal').innerText = "₺" + t.toFixed(2);
            document.getElementById('cCount').innerText = window.cart.length + " Ürün";
        };

        window.fast = (a, f) => { window.cart.push({ ad: a, f: f, q: "1 Adet" }); ui(); };
        window.pay = (m) => { if(window.cart.length > 0) { alert(`${m} ile tamamlandı!`); window.cart = []; ui(); } };

        // MASA YÜKLEME
        window.loadTables = () => {
            const grid = document.getElementById('mGrid');
            grid.innerHTML = "";
            for(let i=1; i<=12; i++) {
                grid.innerHTML += `<div class="ems-card p-8 flex flex-col items-center gap-2 cursor-pointer hover:border-blue-500"><span class="text-[10px] font-black opacity-50 uppercase tracking-widest italic">Masa</span><span class="text-xl font-black">${i}</span><span class="text-[9px] font-bold text-emerald-500 tracking-widest uppercase">Boş</span></div>`;
            }
        };

        // STOK KAYDET
        window.saveToCloud = async () => {
            const n = document.getElementById('sName').value;
            const p = document.getElementById('sPrice').value;
            const b = document.getElementById('barInput').value || prompt("Barkodu okutun veya yazın:");
            if(!n || !p || !b) return alert("Hepsini doldur!");
            await setDoc(doc(db, "urunler", b), { ad: n, fiyat: Number(p) });
            alert("Kayıt Başarılı!");
            tab('market');
        };

    </script>
</body>
</html>
