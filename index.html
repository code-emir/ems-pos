<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EMS POS Enterprise | Emirhan Bozdayı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;800&display=swap');
        :root { --blue: #3b82f6; --dark: #05070a; --card: #0f1218; }
        body { background: var(--dark); color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; }
        .ems-glass { background: var(--card); border: 1px solid rgba(255,255,255,0.03); border-radius: 24px; }
        .active-tab { background: var(--blue) !important; color: white !important; box-shadow: 0 8px 20px rgba(59,130,246,0.3); }
        input:focus { border-color: var(--blue) !important; outline: none; background: #161b24; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div id="authScreen" class="fixed inset-0 z-[1000] bg-black flex items-center justify-center p-6">
        <div class="ems-glass p-10 max-w-lg w-full text-center border-t-4 border-blue-600">
            <h1 style="font-family: 'Syncopate';" class="text-3xl font-bold tracking-tighter mb-2 text-white">EMS<span class="text-blue-500">POS</span></h1>
            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.4em] mb-10">Sistem Giriş ve Onay</p>
            
            <div class="space-y-4 mb-8 text-left">
                <label class="text-[10px] font-bold text-slate-500 ml-2">İŞLETME TÜRÜ SEÇİN</label>
                <select id="sectorSelect" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl font-bold text-blue-400 outline-none">
                    <option value="Market">Market Modu</option>
                    <option value="Restoran">Restoran Modu</option>
                    <option value="Manav">Manav (Terazi) Modu</option>
                </select>
                <input type="password" id="adminPin" placeholder="Onay Kodu (8080)" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl text-center font-black tracking-widest text-white">
            </div>

            <button onclick="loginSystem()" class="w-full bg-blue-600 p-5 rounded-xl font-black text-xs tracking-widest hover:brightness-110 active:scale-95 transition">SİSTEMİ BAŞLAT</button>
            <p class="mt-6 text-[9px] text-slate-700 font-bold uppercase tracking-widest">Kadirli / Osmaniye - Emirhan Bozdayı</p>
        </div>
    </div>

    <div id="mainUI" class="hidden opacity-0 transition-opacity duration-700">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h2 style="font-family: 'Syncopate';" class="text-lg font-bold italic">EMS<span id="displaySector" class="text-blue-500">TOTAL</span></h2>
                <p class="text-[9px] text-slate-500 font-bold uppercase">Durum: Onaylandı</p>
            </div>
            <div class="text-right">
                <p id="clock" class="text-xl font-black text-white">00:00</p>
            </div>
        </header>

        <nav class="grid grid-cols-4 gap-2 mb-8">
            <button onclick="nav('kasa')" id="n-kasa" class="ems-glass p-4 flex flex-col items-center gap-2 active-tab"><i class="fa-solid fa-cash-register"></i><span class="text-[8px] font-bold uppercase">Kasa</span></button>
            <button onclick="nav('masa')" id="n-masa" class="ems-glass p-4 flex flex-col items-center gap-2 text-slate-600"><i class="fa-solid fa-table-cells"></i><span class="text-[8px] font-bold uppercase">Masa</span></button>
            <button onclick="nav('stok')" id="n-stok" class="ems-glass p-4 flex flex-col items-center gap-2 text-slate-600"><i class="fa-solid fa-box"></i><span class="text-[8px] font-bold uppercase">ByStok</span></button>
            <button onclick="nav('cari')" id="n-cari" class="ems-glass p-4 flex flex-col items-center gap-2 text-slate-600"><i class="fa-solid fa-address-book"></i><span class="text-[8px] font-bold uppercase">Cari</span></button>
        </nav>

        <main>
            <div id="v-kasa" class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-7 space-y-4">
                    <div class="ems-glass p-2 border border-blue-500/20 overflow-hidden shadow-2xl"><div id="reader"></div></div>
                    <div class="flex gap-2">
                        <input id="barCodeIn" type="text" placeholder="Barkod Okutun..." class="flex-grow bg-slate-900 p-5 rounded-2xl border border-slate-800 font-bold text-white">
                        <button onclick="processItem()" class="bg-blue-600 px-8 rounded-2xl font-black text-xs">EKLE</button>
                    </div>
                </div>
                <div class="lg:col-span-5 ems-glass p-6 flex flex-col h-[550px] border-t-8 border-blue-600">
                    <h3 class="font-black italic mb-4">SATIŞ LİSTESİ</h3>
                    <div id="cartItems" class="flex-grow overflow-y-auto space-y-3 pr-1"></div>
                    <div class="mt-4 pt-4 border-t border-slate-800">
                        <div class="flex justify-between items-end mb-4 font-black"><span class="text-slate-500 text-[10px]">TOPLAM</span><span id="totalVal" class="text-3xl text-green-400">₺0.00</span></div>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="pay('Nakit')" class="bg-emerald-600 p-4 rounded-xl font-black text-xs">NAKİT</button>
                            <button onclick="pay('Kart')" class="bg-sky-600 p-4 rounded-xl font-black text-xs">KART</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="v-masa" class="hidden grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>

            <div id="v-stok" class="hidden max-w-lg mx-auto ems-glass p-8 text-center border-b-4 border-blue-600">
                <i class="fa-solid fa-file-excel text-4xl text-green-500 mb-4"></i>
                <h4 class="font-black mb-4">Excel ile Stok Güncelle</h4>
                <input type="file" id="excelFile" class="hidden" accept=".xlsx, .xls">
                <button onclick="document.getElementById('excelFile').click()" class="bg-slate-900 border border-slate-800 px-6 py-4 rounded-xl font-bold text-xs hover:border-blue-500 transition w-full">EXCEL DOSYASI SEÇ</button>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-SANA_AIT_ANAHTAR", // Buraya kendi config'ini koy
            authDomain: "ems-pos-b6c2c.firebaseapp.com",
            projectId: "ems-pos-b6c2c",
            storageBucket: "ems-pos-b6c2c.appspot.com",
            messagingSenderId: "36315570077",
            appId: "1:36315570077:web:8d76d47053e1f2516666ba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.cart = [];

        // GİRİŞ VE ONAY (Görseldeki hata için çözüm)
        window.loginSystem = () => {
            const pin = document.getElementById('adminPin').value;
            const sector = document.getElementById('sectorSelect').value;
            if(pin === "8080") {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('mainUI').classList.remove('hidden');
                document.getElementById('displaySector').innerText = sector.toUpperCase();
                setTimeout(() => document.getElementById('mainUI').style.opacity = "1", 50);
                if(sector === "Restoran") loadTables();
                startScanner();
            } else {
                alert("Giriş Onayı Başarısız! Lütfen Emirhan Bozdayı ile iletişime geçin.");
            }
        };

        // NAVİGASYON
        window.nav = (id) => {
            ['kasa', 'masa', 'stok', 'cari'].forEach(v => {
                document.getElementById(`v-${v}`)?.classList.add('hidden');
                document.getElementById(`n-${v}`).classList.remove('active-tab');
            });
            document.getElementById(`v-${id}`).classList.remove('hidden');
            document.getElementById(`n-${id}`).classList.add('active-tab');
        };

        // BARKOD & TERAZİ MOTORU
        let scanner = new Html5Qrcode("reader");
        function startScanner() {
            scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
                document.getElementById('barCodeIn').value = text;
                processItem();
            });
        }

        window.processItem = async () => {
            const code = document.getElementById('barCodeIn').value;
            if(!code) return;
            const snap = await getDoc(doc(db, "urunler", code));
            if(snap.exists()) {
                const d = snap.data();
                window.cart.push({ n: d.ad, f: d.fiyat });
                renderCart();
            }
            document.getElementById('barCodeIn').value = "";
        };

        window.renderCart = () => {
            const list = document.getElementById('cartItems'); list.innerHTML = "";
            let t = 0;
            window.cart.forEach(i => {
                t += i.f;
                list.innerHTML += `<div class="ems-glass p-4 flex justify-between items-center border-l-4 border-blue-600"><span class="font-black text-[10px] uppercase">${i.n}</span><span class="font-bold text-blue-400">₺${i.f.toFixed(2)}</span></div>`;
            });
            document.getElementById('totalVal').innerText = "₺" + t.toFixed(2);
        };

        window.loadTables = () => {
            const g = document.getElementById('v-masa'); g.innerHTML = "";
            for(let i=1; i<=12; i++) g.innerHTML += `<div class="ems-glass p-8 flex flex-col items-center gap-2"><span class="text-[9px] font-bold opacity-30">MASA</span><span class="text-xl font-black">${i}</span><span class="text-[8px] text-emerald-500 font-bold">BOŞ</span></div>`;
        };

        window.pay = (m) => { if(window.cart.length > 0) { alert(m + " Satışı Onaylandı!"); window.cart = []; renderCart(); } };

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'}); }, 1000);
    </script>
</body>
</html>
