<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EMS POS ENTERPRISE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@400;800&display=swap');
        :root { --blue: #3b82f6; --dark: #020408; --card: #0b0f1a; }
        body { background: var(--dark); color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; }
        .ems-glass { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; }
        .ems-input { background: #121826; border: 1px solid #1e293b; padding: 1.25rem; border-radius: 1rem; width: 100%; outline: none; font-weight: 600; }
        .ems-input:focus { border-color: var(--blue); }
        .btn-primary { background: var(--blue); padding: 1.25rem; border-radius: 1rem; font-weight: 800; font-size: 0.75rem; letter-spacing: 0.1em; transition: 0.3s; }
        .btn-primary:active { transform: scale(0.98); }
    </style>
</head>
<body class="p-4">

    <div id="authScreen" class="fixed inset-0 z-[1000] bg-[#020408] flex items-center justify-center p-6">
        <div class="ems-glass p-10 max-w-md w-full border-t-4 border-blue-600 shadow-2xl">
            <div class="text-center mb-8">
                <h1 style="font-family: 'Syncopate';" class="text-3xl font-bold tracking-tighter text-white">EMS<span class="text-blue-500">POS</span></h1>
                <p class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.4em] mt-2">İşletme Yönetim Paneli</p>
            </div>

            <div id="loginForm" class="space-y-4">
                <input type="email" id="email" placeholder="İşletme E-postası" class="ems-input">
                <input type="password" id="password" placeholder="Şifre" class="ems-input">
                
                <div class="space-y-2 py-2">
                    <label class="text-[10px] font-bold text-slate-500 ml-1 uppercase">Sektörünüzü Onaylayın</label>
                    <select id="sector" class="ems-input text-blue-400">
                        <option value="Market">Market & Barkod</option>
                        <option value="Restoran">Restoran & Masa</option>
                        <option value="Manav">Manav & Terazi</option>
                    </select>
                </div>

                <button onclick="handleAuth()" class="w-full btn-primary uppercase">Sisteme Giriş Yap</button>
                <p class="text-center text-[10px] text-slate-600 font-bold mt-4 italic">Kadirli Yerel Veritabanı Senkronizasyonu Aktif</p>
            </div>
        </div>
    </div>

    <div id="mainUI" class="hidden opacity-0 transition-opacity duration-1000">
        <header class="flex justify-between items-center mb-6 px-2">
            <div>
                <h2 style="font-family: 'Syncopate';" class="text-lg font-bold">EMS<span class="text-blue-500">TOTAL</span></h2>
                <p id="userStatus" class="text-[8px] font-black text-slate-500 uppercase tracking-widest"></p>
            </div>
            <div class="text-right">
                <p id="timer" class="text-xl font-black">00:00</p>
                <button onclick="logout()" class="text-[8px] text-red-500 font-bold uppercase">Oturumu Kapat</button>
            </div>
        </header>

        <nav class="grid grid-cols-4 gap-2 mb-6">
            <button onclick="tab('kasa')" id="t-kasa" class="ems-glass p-4 text-blue-500 border-blue-500/20 bg-blue-500/5 flex flex-col items-center gap-1"><i class="fa-solid fa-cash-register"></i><span class="text-[8px] font-bold uppercase">Kasa</span></button>
            <button onclick="tab('masa')" id="t-masa" class="ems-glass p-4 text-slate-500 flex flex-col items-center gap-1"><i class="fa-solid fa-chair"></i><span class="text-[8px] font-bold uppercase">Masa</span></button>
            <button onclick="tab('stok')" id="t-stok" class="ems-glass p-4 text-slate-500 flex flex-col items-center gap-1"><i class="fa-solid fa-box"></i><span class="text-[8px] font-bold uppercase">Stok</span></button>
            <button onclick="tab('cari')" id="t-cari" class="ems-glass p-4 text-slate-500 flex flex-col items-center gap-1"><i class="fa-solid fa-users"></i><span class="text-[8px] font-bold uppercase">Cari</span></button>
        </nav>

        <main id="content">
            <div id="v-kasa" class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-7">
                    <div id="scanner" class="ems-glass overflow-hidden mb-4 border border-blue-500/20 shadow-2xl"></div>
                    <div class="flex gap-2">
                        <input id="barcode" type="text" placeholder="Barkod Okutun..." class="ems-input text-xl">
                        <button onclick="add()" class="btn-primary px-8">EKLE</button>
                    </div>
                </div>
                <div class="lg:col-span-5 ems-glass p-6 flex flex-col h-[500px]">
                    <div id="cart" class="flex-grow overflow-y-auto space-y-2 mb-4"></div>
                    <div class="border-t border-slate-800 pt-4">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[10px] font-bold text-slate-500">TOPLAM</span>
                            <span id="total" class="text-3xl font-black text-green-400">₺0,00</span>
                        </div>
                        <button onclick="finish()" class="w-full btn-primary bg-emerald-600">SATIŞI TAMAMLA</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-SANA_OZEL_KEY", // Buraya senin Firebase Key'in gelecek
            authDomain: "ems-pos-b6c2c.firebaseapp.com",
            projectId: "ems-pos-b6c2c",
            storageBucket: "ems-pos-b6c2c.appspot.com",
            messagingSenderId: "36315570077",
            appId: "1:36315570077:web:8d76d47053e1f2516666ba"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // OTURUM YÖNETİMİ (Planladığımız e-posta sistemi)
        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const sector = document.getElementById('sector').value;

            try {
                // Önce giriş dene, olmazsa kayıt yap (İşletme Kaydı Mantığı)
                const res = await signInWithEmailAndPassword(auth, email, password);
                console.log("Giriş Başarılı");
            } catch (err) {
                if(err.code === 'auth/user-not-found') {
                    const res = await createUserWithEmailAndPassword(auth, email, password);
                    await setDoc(doc(db, "isletmeler", res.user.uid), { email, sector, created: new Date() });
                } else { alert("Hata: " + err.message); }
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('mainUI').classList.remove('hidden');
                setTimeout(() => document.getElementById('mainUI').style.opacity = "1", 50);
                document.getElementById('userStatus').innerText = "İŞLETME: " + user.email;
                startScanner();
            } else {
                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('mainUI').classList.add('hidden');
            }
        });

        window.logout = () => signOut(auth);

        // BARKOD SİSTEMİ
        let html5QrCode = new Html5Qrcode("scanner");
        function startScanner() {
            html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
                document.getElementById('barcode').value = text;
                add();
            });
        }

        window.add = async () => {
            const code = document.getElementById('barcode').value;
            const snap = await getDoc(doc(db, "urunler", code));
            if(snap.exists()) {
                const item = snap.data();
                const div = document.createElement('div');
                div.className = 'ems-glass p-4 flex justify-between border-l-4 border-blue-500';
                div.innerHTML = `<span class="font-bold text-xs uppercase">${item.ad}</span><span class="font-black text-blue-400">₺${item.fiyat}</span>`;
                document.getElementById('cart').appendChild(div);
                updateTotal(item.fiyat);
            }
            document.getElementById('barcode').value = "";
        };

        let grandTotal = 0;
        function updateTotal(price) {
            grandTotal += parseFloat(price);
            document.getElementById('total').innerText = "₺" + grandTotal.toLocaleString('tr-TR', {minimumFractionDigits: 2});
        }

        window.tab = (id) => {
            ['kasa', 'masa', 'stok', 'cari'].forEach(t => {
                document.getElementById('t-'+t).className = 'ems-glass p-4 text-slate-500 flex flex-col items-center gap-1';
            });
            document.getElementById('t-'+id).className = 'ems-glass p-4 text-blue-500 border-blue-500/20 bg-blue-500/5 flex flex-col items-center gap-1';
        };

        setInterval(() => { document.getElementById('timer').innerText = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'}); }, 1000);
    </script>
</body>
</html>
