<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EMS TOTAL v2.0 | Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@400;800&display=swap');
        :root { --blue: #3b82f6; --dark: #020408; --card: #0b0f1a; }
        body { background: var(--dark); color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; }
        .ems-glass { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 28px; }
        .ems-input { background: #121826; border: 1px solid #1e293b; padding: 1.25rem; border-radius: 1rem; width: 100%; outline: none; font-weight: 600; color: white; transition: 0.3s; }
        .ems-input:focus { border-color: var(--blue); box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
        .btn-primary { background: var(--blue); padding: 1.25rem; border-radius: 1rem; font-weight: 800; font-size: 0.75rem; letter-spacing: 0.1em; transition: 0.3s; width: 100%; }
        .tab-active { background: var(--blue) !important; color: white !important; }
    </style>
</head>
<body class="p-4">

    <div id="authScreen" class="fixed inset-0 z-[1000] bg-[#020408] flex items-center justify-center p-6">
        <div class="ems-glass p-10 max-w-md w-full border-t-8 border-blue-600 shadow-2xl text-center">
            <h1 style="font-family: 'Syncopate';" class="text-3xl font-bold tracking-tighter text-white mb-2 italic">EMS<span class="text-blue-500">POS</span></h1>
            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.4em] mb-10">İşletme Onay Sistemi</p>
            
            <div class="space-y-4">
                <input type="email" id="email" placeholder="İşletme E-postası" class="ems-input">
                <input type="password" id="password" placeholder="Şifre" class="ems-input">
                
                <div class="text-left">
                    <label class="text-[10px] font-bold text-slate-600 ml-1 uppercase">Sektör Seçimi</label>
                    <select id="sectorSelect" class="ems-input text-blue-400">
                        <option value="Market">Market Modu</option>
                        <option value="Restoran">Restoran Modu</option>
                        <option value="Manav">Manav Modu</option>
                    </select>
                </div>

                <button onclick="handleAuth()" class="btn-primary mt-6">SİSTEME GİRİŞ YAP</button>
            </div>

            <div class="mt-10 pt-6 border-t border-slate-900">
                <p class="text-[9px] text-slate-600 font-bold uppercase tracking-widest">
                    Software by Emirhan Bozdayı<br>
                    Tüm Hakları Saklıdır © 2026
                </p>
            </div>
        </div>
    </div>

    <div id="mainUI" class="hidden opacity-0 transition-opacity duration-1000">
        <header class="flex justify-between items-center mb-8 px-2">
            <div>
                <h2 style="font-family: 'Syncopate';" class="text-xl font-bold italic tracking-tighter">EMS<span class="text-blue-500" id="headerSektor">TOTAL</span></h2>
                <p id="userMail" class="text-[8px] font-black text-slate-500 uppercase tracking-widest mt-1"></p>
            </div>
            <div class="text-right">
                <p id="clock" class="text-2xl font-black text-white">00:00</p>
                <button onclick="logout()" class="text-[10px] text-red-500 font-bold uppercase underline">Oturumu Kapat</button>
            </div>
        </header>

        <nav class="grid grid-cols-4 gap-2 mb-8">
            <button onclick="tab('kasa')" id="n-kasa" class="ems-glass p-5 flex flex-col items-center gap-2 tab-active"><i class="fa-solid fa-cash-register"></i><span class="text-[9px] font-black uppercase">Kasa</span></button>
            <button onclick="tab('masa')" id="n-masa" class="ems-glass p-5 flex flex-col items-center gap-2 text-slate-600"><i class="fa-solid fa-table-cells"></i><span class="text-[9px] font-black uppercase">Masa</span></button>
            <button onclick="tab('stok')" id="n-stok" class="ems-glass p-5 flex flex-col items-center gap-2 text-slate-600"><i class="fa-solid fa-box"></i><span class="text-[9px] font-black uppercase">Stok</span></button>
            <button onclick="tab('cari')" id="n-cari" class="ems-glass p-5 flex flex-col items-center gap-2 text-slate-600"><i class="fa-solid fa-users"></i><span class="text-[9px] font-black uppercase">Cari</span></button>
        </nav>

        <main id="v-kasa" class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-7">
                <div class="ems-glass p-2 border border-blue-500/10 mb-6 overflow-hidden"><div id="reader"></div></div>
                <div class="flex gap-2">
                    <input id="barcodeIn" type="text" placeholder="Barkod Okut..." class="ems-input text-xl flex-grow">
                    <button onclick="addItem()" class="bg-blue-600 px-10 rounded-2xl font-black text-xs">EKLE</button>
                </div>
            </div>
            <div class="lg:col-span-5 ems-glass p-8 flex flex-col h-[550px] border-t-8 border-blue-600">
                <div id="cart" class="flex-grow overflow-y-auto space-y-3"></div>
                <div class="pt-6 border-t border-slate-800 mt-4 font-black">
                    <div class="flex justify-between items-end mb-6 text-slate-500 text-[10px] uppercase"><span>Toplam</span><span id="totalVal" class="text-4xl text-green-400">₺0.00</span></div>
                    <button class="btn-primary bg-emerald-600">SATIŞI TAMAMLA</button>
                </div>
            </div>
        </main>
        
        <footer class="mt-12 text-center opacity-30">
            <p class="text-[10px] font-bold uppercase tracking-[0.3em]">Software by Emirhan Bozdayı - Tüm Hakları Saklıdır</p>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-KEY",
            authDomain: "ems-pos-b6c2c.firebaseapp.com",
            projectId: "ems-pos-b6c2c",
            storageBucket: "ems-pos-b6c2c.appspot.com",
            messagingSenderId: "36315570077",
            appId: "1:36315570077:web:8d76d47053e1f2516666ba"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- ASIL BEKLEDİĞİN ONAY MANTIĞI ---
        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const sector = document.getElementById('sectorSelect').value;

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                if(err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "isletmeler", res.user.uid), {
                        email, sector, onay: false, tarih: new Date()
                    });
                    alert("Kayıt Oluşturuldu! Emirhan Bozdayı tarafından onaylanması bekleniyor.");
                    await signOut(auth);
                } else { alert("Hata: " + err.message); }
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "isletmeler", user.uid));
                if(snap.exists() && snap.data().onay === true) {
                    document.getElementById('authScreen').classList.add('hidden');
                    document.getElementById('mainUI').classList.remove('hidden');
                    setTimeout(() => document.getElementById('mainUI').style.opacity = "1", 50);
                    document.getElementById('userMail').innerText = "Aktif İşletme: " + user.email;
                    document.getElementById('headerSektor').innerText = snap.data().sector.toUpperCase();
                    startScanner();
                } else {
                    alert("LİSANS HATASI: Onaylanmamış İşletme. Emirhan Bozdayı ile görüşün.");
                    await signOut(auth);
                }
            } else {
                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('mainUI').classList.add('hidden');
            }
        });

        window.logout = () => signOut(auth);

        let scanner = new Html5Qrcode("reader");
        function startScanner() {
            scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (text) => {
                document.getElementById('barcodeIn').value = text;
                addItem();
            });
        }

        window.addItem = async () => {
            const b = document.getElementById('barcodeIn').value;
            const snap = await getDoc(doc(db, "urunler", b));
            if(snap.exists()) {
                const i = snap.data();
                const div = document.createElement('div');
                div.className = 'ems-glass p-4 flex justify-between border-l-4 border-blue-500';
                div.innerHTML = `<span class="text-[10px] font-black uppercase">${i.ad}</span><span class="text-blue-400 font-black">₺${i.fiyat}</span>`;
                document.getElementById('cart').appendChild(div);
            }
            document.getElementById('barcodeIn').value = "";
        };

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'}); }, 1000);
    </script>
</body>
</html>
