<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS Global SaaS | Cloud Automation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #e2e8f0; }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-btn:hover { background: #1e293b; color: #60a5fa; }
        .active-nav { background: #1e293b; color: #3b82f6; border-right: 4px solid #3b82f6; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-[#020617] border-r border-slate-800 flex flex-col justify-between">
        <div>
            <div class="p-8">
                <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent italic">EMS SaaS MASTER</h1>
            </div>
            <nav class="space-y-1 px-4">
                <button onclick="switchTab('dashboard')" class="sidebar-btn active-nav w-full flex items-center p-4 rounded-xl transition-all" id="nav-dashboard">
                    <span class="mr-3">📊</span> Dashboard
                </button>
                <button onclick="switchTab('cari')" class="sidebar-btn w-full flex items-center p-4 rounded-xl transition-all" id="nav-cari">
                    <span class="mr-3">👥</span> Cari Takip
                </button>
                <button onclick="switchTab('stok')" class="sidebar-btn w-full flex items-center p-4 rounded-xl transition-all" id="nav-stok">
                    <span class="mr-3">📦</span> Stok Yönetimi
                </button>
            </nav>
        </div>
        <div class="p-6 border-t border-slate-800">
            <div class="flex items-center space-x-3">
                <div id="status-dot" class="w-2.5 h-2.5 bg-yellow-500 rounded-full animate-pulse"></div>
                <span id="status-text" class="text-xs text-slate-400 font-medium tracking-wider">BULUT BAĞLANTISI...</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="h-16 flex items-center justify-between px-10 border-b border-slate-800 bg-[#020617]/80 backdrop-blur-md sticky top-0 z-10">
            <h2 id="header-title" class="text-lg font-semibold tracking-wide">Genel Durum</h2>
            <div class="flex items-center space-x-6">
                <button onclick="toggleAddModal()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm font-semibold transition-all shadow-lg shadow-blue-900/20">
                    + Yeni Kayıt
                </button>
                <div class="h-8 w-px bg-slate-800"></div>
                <span class="text-sm font-medium text-slate-400 italic">User: emirhan_bozdayi</span>
            </div>
        </header>

        <div id="content-scroll" class="flex-1 overflow-y-auto p-10 space-y-8">
            
            <section id="sec-dashboard" class="space-y-8 animate-in fade-in duration-500">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="glass-card p-8 rounded-3xl relative overflow-hidden group">
                        <p class="text-slate-400 text-sm font-medium">Toplam Alacak</p>
                        <h3 id="total-debt" class="text-4xl font-bold text-red-500 mt-2">₺0,00</h3>
                        <div class="absolute -right-4 -bottom-4 text-6xl opacity-5 grayscale group-hover:grayscale-0 transition-all">💸</div>
                    </div>
                    <div class="glass-card p-8 rounded-3xl relative overflow-hidden group">
                        <p class="text-slate-400 text-sm font-medium">Stoktaki Ürün</p>
                        <h3 id="total-stock" class="text-4xl font-bold text-emerald-500 mt-2">0 Adet</h3>
                        <div class="absolute -right-4 -bottom-4 text-6xl opacity-5 grayscale group-hover:grayscale-0 transition-all">📦</div>
                    </div>
                    <div class="glass-card p-8 rounded-3xl relative overflow-hidden group">
                        <p class="text-slate-400 text-sm font-medium">Günlük Tahsilat</p>
                        <h3 class="text-4xl font-bold text-blue-500 mt-2">₺0,00</h3>
                        <div class="absolute -right-4 -bottom-4 text-6xl opacity-5 grayscale group-hover:grayscale-0 transition-all">📈</div>
                    </div>
                </div>
            </section>

            <section id="sec-cari" class="hidden space-y-4 animate-in slide-in-from-bottom-4 duration-500">
                <div class="glass-card rounded-3xl overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-800/30">
                            <tr>
                                <th class="px-8 py-5 text-slate-400 font-semibold uppercase text-xs tracking-widest">Müşteri Detayı</th>
                                <th class="px-8 py-5 text-slate-400 font-semibold uppercase text-xs tracking-widest text-right font-mono">Bakiye</th>
                                <th class="px-8 py-5 text-slate-400 font-semibold uppercase text-xs tracking-widest text-center">İşlem</th>
                            </tr>
                        </thead>
                        <tbody id="firebase-cari-list" class="divide-y divide-slate-800">
                            </tbody>
                    </table>
                </div>
            </section>

        </div>
    </main>

    <script>
        // 1. FIREBASE CONFIGURATION (Firebase Console'dan alacağın bilgiler)
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            databaseURL: "https://ems-project-default-rtdb.firebaseio.com",
            projectId: "ems-project",
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. LIVE DATA LISTENER (Canlı Veri Dinleme)
        function listenToData() {
            const cariRef = db.ref('cariler');
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');

            cariRef.on('value', (snapshot) => {
                const data = snapshot.val();
                const listContainer = document.getElementById('firebase-cari-list');
                listContainer.innerHTML = '';
                let total = 0;

                if (data) {
                    Object.keys(data).forEach(key => {
                        const item = data[key];
                        total += parseFloat(item.borc || 0);
                        
                        listContainer.innerHTML += `
                            <tr class="hover:bg-slate-800/20 transition-colors">
                                <td class="px-8 py-6">
                                    <div class="font-bold text-blue-100">${item.isim}</div>
                                    <div class="text-xs text-slate-500 mt-1">${item.tel || 'No Tel'}</div>
                                </td>
                                <td class="px-8 py-6 text-right font-bold text-red-400 font-mono italic">₺${item.borc}</td>
                                <td class="px-8 py-6 text-center">
                                    <button class="bg-slate-800 hover:bg-red-900/40 text-xs px-4 py-2 rounded-lg transition-all border border-slate-700">Tahsilat Yap</button>
                                </td>
                            </tr>
                        `;
                    });
                }
                
                document.getElementById('total-debt').innerText = `₺${total.toLocaleString('tr-TR')}`;
                statusDot.classList.replace('bg-yellow-500', 'bg-green-500');
                statusDot.classList.remove('animate-pulse');
                statusText.innerText = "SİSTEM ÇEVRİMİÇİ";
            });
        }

        // 3. TAB NAVIGATION
        function switchTab(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active-nav'));
            
            document.getElementById('sec-' + id).classList.remove('hidden');
            document.getElementById('nav-' + id).classList.add('active-nav');
            document.getElementById('header-title').innerText = id.charAt(0).toUpperCase() + id.slice(1);
        }

        // Uygulamayı başlat
        window.onload = listenToData;

    </script>
</body>
</html>
