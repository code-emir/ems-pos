<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMS ERP FULL</title>

<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>

<style>
:root{
--bg:#0b1220;
--card:#111827;
--blue:#2563eb;
--green:#10b981;
--red:#ef4444;
--border:#1f2937;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:var(--bg);
color:white;
overflow:hidden;
height:100vh;
display:flex;
flex-direction:column;
}

nav{
background:#111827;
padding:10px;
display:flex;
gap:10px;
overflow:auto;
border-bottom:1px solid var(--border);
}

nav button{
background:var(--blue);
border:none;
padding:10px;
color:white;
border-radius:8px;
cursor:pointer;
white-space:nowrap;
}

.screen{
display:none;
padding:15px;
overflow:auto;
flex:1;
}

.active{
display:block;
}

.card{
background:var(--card);
padding:15px;
border-radius:15px;
margin-bottom:15px;
border:1px solid var(--border);
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
}

button{
cursor:pointer;
}

.btn{
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
width:100%;
font-weight:bold;
}

.btn-blue{
background:var(--blue);
color:white;
}

.btn-green{
background:var(--green);
color:white;
}

.btn-red{
background:var(--red);
color:white;
}

.table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

.table th,.table td{
padding:10px;
border-bottom:1px solid #333;
text-align:left;
}

#auth-screen{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.auth-box{
width:90%;
max-width:400px;
background:#111827;
padding:25px;
border-radius:20px;
border:1px solid var(--border);
}

#interactive{
height:220px;
background:black;
border-radius:10px;
overflow:hidden;
}

.badge{
padding:8px 15px;
background:var(--green);
display:inline-block;
border-radius:30px;
margin-top:10px;
font-size:12px;
}
</style>
</head>

<body>

<div id="auth-screen">

<div class="auth-box">

<h1 style="text-align:center;color:#2563eb;">EMS ERP</h1>

<div id="login-form">

<input type="email" id="email" placeholder="E-posta">
<input type="password" id="pass" placeholder="Şifre">

<button class="btn btn-blue" onclick="login()">Giriş Yap</button>

<p onclick="toggleForm(true)"
style="margin-top:15px;text-align:center;color:#2563eb;cursor:pointer;">
Yeni İşletme Kaydı
</p>

</div>

<div id="reg-form" style="display:none;">

<input type="text" id="r-name" placeholder="İşletme Adı">

<select id="r-type">
<option value="market">Market / Bakkal</option>
<option value="manav">Manav</option>
<option value="restoran">Restoran / Kafe</option>
<option value="teknikservis">Teknik Servis</option>
</select>

<input type="email" id="r-email" placeholder="E-posta">
<input type="password" id="r-pass" placeholder="Şifre">

<button class="btn btn-green" onclick="register()">Kayıt Ol</button>

<p onclick="toggleForm(false)"
style="margin-top:15px;text-align:center;color:#2563eb;cursor:pointer;">
Girişe Dön
</p>

</div>

</div>

</div>

<nav>

<button onclick="showScreen('dashboard')">Panel</button>
<button onclick="showScreen('pos')">POS</button>
<button onclick="showScreen('products')">Ürün</button>
<button onclick="showScreen('tables')">Masalar</button>
<button onclick="showScreen('service')">Servis</button>
<button onclick="showScreen('finance')">Finans</button>
<button onclick="showScreen('staff')">Personel</button>
<button onclick="showScreen('reports')">Rapor</button>
<button onclick="logout()">Çıkış</button>

</nav>

<!-- DASHBOARD -->

<section id="dashboard" class="screen active">

<div class="card">

<h2 id="biz-name">EMS ERP</h2>

<p id="biz-type"></p>

<div id="sector-badge"></div>

</div>

<div class="card">
<h3>İstatistikler</h3>
<p>Toplam Ürün: <span id="total-products">0</span></p>
<p>Toplam Servis: <span id="total-services">0</span></p>
<p>Toplam Masa: <span id="total-tables">0</span></p>
</div>

</section>

<!-- POS -->

<section id="pos" class="screen">

<div class="card">

<h3>Barkod POS Sistemi</h3>

<div id="interactive"></div>

<input id="barcode-input" placeholder="Barkod veya ürün adı">

<button class="btn btn-green" onclick="addSale()">
Satışa Ekle
</button>

<table class="table">

<thead>
<tr>
<th>Ürün</th>
<th>Fiyat</th>
</tr>
</thead>

<tbody id="sale-list"></tbody>

</table>

<h2 style="margin-top:20px;">
Toplam: <span id="total-price">0</span> TL
</h2>

</div>

</section>

<!-- ÜRÜNLER -->

<section id="products" class="screen">

<div class="card">

<h3>Ürün Yönetimi</h3>

<input id="p-name" placeholder="Ürün Adı">
<input id="p-price" placeholder="Fiyat">
<input id="p-stock" placeholder="Stok">
<input id="p-barcode" placeholder="Barkod">

<button class="btn btn-blue" onclick="addProduct()">
Ürün Ekle
</button>

</div>

<div class="card">

<table class="table">

<thead>
<tr>
<th>Ürün</th>
<th>Fiyat</th>
<th>Stok</th>
</tr>
</thead>

<tbody id="product-table"></tbody>

</table>

</div>

</section>

<!-- RESTORAN -->

<section id="tables" class="screen">

<div class="card">

<h3>Masa Yönetimi</h3>

<input id="table-name" placeholder="Masa Adı">

<button class="btn btn-green" onclick="addTable()">
Masa Ekle
</button>

<div id="table-list"></div>

</div>

</section>

<!-- TEKNİK SERVİS -->

<section id="service" class="screen">

<div class="card">

<h3>Teknik Servis Kayıt</h3>

<input id="customer-name" placeholder="Müşteri">
<input id="device-name" placeholder="Cihaz">
<input id="problem" placeholder="Arıza">

<button class="btn btn-blue" onclick="addService()">
Servis Kaydı Aç
</button>

</div>

<div class="card">

<table class="table">

<thead>
<tr>
<th>Müşteri</th>
<th>Cihaz</th>
<th>Durum</th>
</tr>
</thead>

<tbody id="service-table"></tbody>

</table>

</div>

</section>

<!-- FİNANS -->

<section id="finance" class="screen">

<div class="card">

<h3>Gelir / Gider</h3>

<input id="income" placeholder="Gelir">
<button class="btn btn-green" onclick="addIncome()">
Gelir Ekle
</button>

<input id="expense" placeholder="Gider">
<button class="btn btn-red" onclick="addExpense()">
Gider Ekle
</button>

</div>

</section>

<!-- PERSONEL -->

<section id="staff" class="screen">

<div class="card">

<h3>Personel Yönetimi</h3>

<input id="staff-name" placeholder="Personel Adı">

<button class="btn btn-blue" onclick="addStaff()">
Personel Ekle
</button>

<div id="staff-list"></div>

</div>

</section>

<!-- RAPOR -->

<section id="reports" class="screen">

<div class="card">

<h3>Rapor Sistemi</h3>

<button class="btn btn-green" onclick="generateReport()">
Günlük Rapor Oluştur
</button>

<div id="report-box"></div>

</div>

</section>

<script>

const firebaseConfig = {
apiKey: "AIzaSyCkwCPXxUayvLclNMgC-6yk-m5STG_7NLI",
authDomain: "ems-pos-5b50b.firebaseapp.com",
projectId: "ems-pos-5b50b",
storageBucket: "ems-pos-5b50b.firebasestorage.app",
messagingSenderId: "444531568303",
appId: "1:444531568303:web:dba6979ace54e0aeae2e5a"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let total = 0;

function toggleForm(isReg){

document.getElementById('login-form').style.display =
isReg ? 'none' : 'block';

document.getElementById('reg-form').style.display =
isReg ? 'block' : 'none';

}

function register(){

const email=document.getElementById('r-email').value;
const pass=document.getElementById('r-pass').value;
const name=document.getElementById('r-name').value;
const type=document.getElementById('r-type').value;

if(!email || !pass || !name){
alert("Alanları doldurun");
return;
}

auth.createUserWithEmailAndPassword(email,pass)

.then(res=>{

db.collection("isletmeler")
.doc(res.user.uid)
.set({
name:name,
type:type,
onayli:false,
email:email,
kayitTarihi:new Date().toISOString()
})

.then(()=>{

alert("Kayıt başarılı. Onay bekleniyor.");

auth.signOut();

location.reload();

});

})

.catch(err=>alert(err.message));

}

function login(){

const email=document.getElementById('email').value;
const pass=document.getElementById('pass').value;

auth.signInWithEmailAndPassword(email,pass)

.then(res=>{

db.collection("isletmeler")
.doc(res.user.uid)
.get()

.then(doc=>{

if(doc.exists && doc.data().onayli===true){

currentUser=res.user.uid;

document.getElementById('auth-screen').style.display='none';

document.getElementById('biz-name').innerText =
doc.data().name;

document.getElementById('biz-type').innerText =
"İşletme Türü: " + doc.data().type.toUpperCase();

setupSector(doc.data().type);

startScanner();

loadProducts();

loadServices();

loadTables();

}else{

alert("Hesap onaylanmamış");

auth.signOut();

}

});

})

.catch(err=>alert(err.message));

}

function setupSector(type){

let text="";

if(type==="market") text="MARKET MODU";
if(type==="manav") text="MANAV MODU";
if(type==="restoran") text="RESTORAN MODU";
if(type==="teknikservis") text="TEKNİK SERVİS MODU";

document.getElementById('sector-badge').innerHTML =
'<div class="badge">'+text+'</div>';

}

function startScanner(){

Quagga.init({

inputStream:{
name:"Live",
type:"LiveStream",
target:document.querySelector('#interactive')
},

decoder:{
readers:["ean_reader","code_128_reader"]
}

},

err=>{

if(err){
console.log(err);
return;
}

Quagga.start();

});

Quagga.onDetected(data=>{

document.getElementById('barcode-input').value =
data.codeResult.code;

});

}

function addSale(){

const code=document.getElementById('barcode-input').value;

if(!code) return;

total += 100;

document.getElementById('sale-list').innerHTML += `
<tr>
<td>${code}</td>
<td>100 TL</td>
</tr>
`;

document.getElementById('total-price').innerText=total;

document.getElementById('barcode-input').value='';

}

function addProduct(){

const name=document.getElementById('p-name').value;
const price=document.getElementById('p-price').value;
const stock=document.getElementById('p-stock').value;
const barcode=document.getElementById('p-barcode').value;

db.collection("urunler").add({
uid:currentUser,
name,
price,
stock,
barcode
})

.then(()=>{

alert("Ürün eklendi");

loadProducts();

});

}

function loadProducts(){

db.collection("urunler")
.where("uid","==",currentUser)
.get()

.then(snap=>{

let html='';

document.getElementById('total-products').innerText =
snap.size;

snap.forEach(doc=>{

const d=doc.data();

html += `
<tr>
<td>${d.name}</td>
<td>${d.price} TL</td>
<td>${d.stock}</td>
</tr>
`;

});

document.getElementById('product-table').innerHTML=html;

});

}

function addTable(){

const name=document.getElementById('table-name').value;

db.collection("masalar").add({
uid:currentUser,
name:name,
status:"BOŞ"
})

.then(()=>{

loadTables();

});

}

function loadTables(){

db.collection("masalar")
.where("uid","==",currentUser)
.get()

.then(snap=>{

document.getElementById('total-tables').innerText =
snap.size;

let html='';

snap.forEach(doc=>{

const d=doc.data();

html += `
<div class="card">
${d.name} - ${d.status}
</div>
`;

});

document.getElementById('table-list').innerHTML=html;

});

}

function addService(){

const customer=document.getElementById('customer-name').value;
const device=document.getElementById('device-name').value;
const problem=document.getElementById('problem').value;

db.collection("servisler").add({
uid:currentUser,
customer,
device,
problem,
status:"Bekliyor"
})

.then(()=>{

loadServices();

});

}

function loadServices(){

db.collection("servisler")
.where("uid","==",currentUser)
.get()

.then(snap=>{

document.getElementById('total-services').innerText =
snap.size;

let html='';

snap.forEach(doc=>{

const d=doc.data();

html += `
<tr>
<td>${d.customer}</td>
<td>${d.device}</td>
<td>${d.status}</td>
</tr>
`;

});

document.getElementById('service-table').innerHTML=html;

});

}

function addIncome(){

alert("Gelir eklendi");

}

function addExpense(){

alert("Gider eklendi");

}

function addStaff(){

const name=document.getElementById('staff-name').value;

document.getElementById('staff-list').innerHTML += `
<div class="card">${name}</div>
`;

}

function generateReport(){

document.getElementById('report-box').innerHTML = `
<div class="card">
Bugünkü satış toplamı: ${total} TL
</div>
`;

}

function showScreen(id){

document.querySelectorAll('.screen').forEach(s=>{
s.classList.remove('active');
});

document.getElementById(id).classList.add('active');

}

function logout(){

auth.signOut()
.then(()=>location.reload());

}

</script>

</body>
</html>
