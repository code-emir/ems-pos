<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EMS POS Platform v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');
        body { background: #080a0f; color: #f1f5f9; font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        .active-tab { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); color: white; box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.5); }
        #reader { width: 100% !important; border: none !important; border-radius: 24px; overflow: hidden; }
        .table-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .table-btn:active { transform: scale(0.95); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="p-2 md:p-6 lg:p-8">

    <div id="setupScreen" class="fixed inset-0 z-50 glass flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-[40px] max-w-lg w-full shadow-2xl text-center">
            <h1 class="text-4xl font-black mb-2 italic">EMS<span class="text-blue-500">POS</span></h1>
            <p class="text-slate-400 mb-8 text-sm uppercase tracking-widest font-bold">Lütfen İşletme Türünü Seçin</p>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="finishSetup('Market')" class="p-6 glass rounded-3xl hover:border-blue-500 transition-all flex flex-col items-center gap-3">
                    <i class="fa-solid fa-store text-2xl text-blue-500"></i><span class="font-bold">Market</span>
                </button>
                <button onclick="finishSetup('Manav')" class="p-6 glass rounded-3xl hover:border-green-500 transition-all flex flex-col items-center gap-3">
                    <i class="fa-solid fa-carrot text-2xl text-green-500"></i><span class="font-bold">Manav</span>
                </button>
                <button onclick="finishSetup('Restoran')" class="p-6 glass rounded-3xl hover:border-orange-500 transition-all flex flex-col items-center gap-3">
                    <i class="fa-solid fa-utensils text-2xl text-orange-500"></i><span class="font-bold">Restoran</span>
                </button>
                <button onclick="finishSetup('Kafe')" class="p-6 glass rounded-3xl hover:border-pink-500 transition-all flex flex-col items-center gap-3">
                    <i class="fa-solid fa-coffee text-2xl text-pink-500"></i><span class="font-bold">Kafe</span>
                </button>
            </div>
        </div>
    </div>

    <div id="mainUI" class="hidden">
        <header class="glass rounded-[32px] p-6 mb-6 flex justify-between items-center border-b-4 border-blue-600 shadow-xl">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-900/40">
                    <i class="fa-solid fa-bolt text-xl text-white"></i>
                </div>
                <div>
                    <h2 class="text-xl font-black tracking-tighter" id="brandTitle">EMS POS</h2>
                    <p id="modeBadge" class="text-[9px] font-bold uppercase tracking-widest text-blue-400">MARKET SİSTEMİ</p>
                </div>
            </div>
            <div class="text-right">
                <p id="clock" class="text-xl font-black text-white leading-none">00:00:00</p>
                <button onclick="resetSetup()" class="text-[9px] text-slate-600 hover:text-red-500 font-bold uppercase tracking-widest transition mt-1">İşletme Değiştir</button>
            </div>
        </header>

        <nav class="grid grid-cols-4 gap-2 mb-6">
            <button onclick="showView('pos')" id="nav-pos" class="glass rounded-2xl py-4 flex flex-col items-center gap-1 active-tab">
                <i class="fa-solid fa-cash-register text-lg"></i><span class="text-[10px] font-bold">KASA</span>
            </button>
            <button onclick="showView('tables')" id="nav-tables" class="glass rounded-2xl py-4 flex flex-col items-center gap-1 text-slate-500">
                <i class="fa-solid fa-table-cells text-lg"></i><span class="text-[10px] font-bold">MASALAR</span>
            </button>
            <button onclick="showView('inventory')" id="nav-inventory" class="glass rounded-2xl py-4 flex flex-col items-center gap-1 text-slate-500">
                <i class="fa-solid fa-box text-lg"></i><span class="text-[10px] font-bold">STOK</span>
            </button>
            <button onclick="showView('ledger')" id="nav-ledger" class="glass rounded-2xl py-4 flex flex-col items-center gap-1 text-slate-500">
                <i class="fa-solid fa-address-book text-lg"></i><span class="text-[10px] font-bold">CARİ</span>
            </button>
        </nav>

        <main>
            <div id="view-pos" class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-7">
                    <div class="glass rounded-[32px] p-2 shadow-inner border border-slate-800 mb-4">
                        <div id="reader" class="bg-black"></div>
                    </div>
                    <div class="flex gap-2">
                        <input id="barcodeInput" type="text" placeholder="Barkod veya Ağırlık..." class="flex-grow bg-slate-900 p-5 rounded-2xl border border-slate-800 text-white font-bold outline-none focus:border-blue-500">
                        <button onclick="handleCode()" class="bg-blue-600 px-8 rounded-2xl font-black">EKLE</button>
                    </div>
                    <div id="fastButtons" class="grid grid-cols-3 gap-2 mt-4">
                        <button onclick="addFastItem('Ekmek', 10)" class="glass p-4 rounded-xl text-xs font-bold border-l-4 border-yellow-500">EKMEK</button>
                        <button onclick="addFastItem('Poşet', 0.25)" class="glass p-4 rounded-xl text-xs font-bold border-l-4 border-blue-500">POŞET</button>
                        <button onclick="addFastItem('Yumurta', 3)" class="glass p-4 rounded-xl text-xs font-bold border-l-4 border-white">YUMURTA</button>
                    </div>
                </div>

                <div class="lg:col-span-5 glass rounded-[32px] p-6 flex flex-col h-[550px] border-t-8 border-blue-600">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-black italic">SEPET</h3>
                        <span id="cartCount" class="text-[10px] bg-blue-600/20 text-blue-400 px-3 py-1 rounded-full font-bold">0 Ürün</span>
                    </div>
                    <div id="cartList" class="flex-grow overflow-y-auto space-y-3 custom-scroll"></div>
                    <div class="mt-6 pt-6 border-t border-slate-800">
                        <div class="flex justify-between items-end mb-6">
                            <span class="text-slate-500 text-xs font-bold uppercase">Toplam</span>
                            <span id="cartTotal" class="text-4xl font-black text-green-400 tracking-tighter">₺0.00</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mb-2">
                            <button onclick="completeSale('Nakit')" class="bg-emerald-600 p-4 rounded-xl font-black text-xs">NAKİT</button>
                            <button onclick="completeSale('Kart')" class="bg-sky-600 p-4 rounded-xl font-black text-xs">KART</button>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="completeSale('Veresiye')" class="bg-orange-600 p-3 rounded-xl font-black text-[10px]">VERESİYE</button>
                            <button onclick="completeSale('EFT/Havale')" class="bg-indigo-600 p-3 rounded-xl font-black text-[10px] uppercase">EFT/Havale</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-tables" class="hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-black uppercase">Masa Planı</h2>
                    <button onclick="addTablePrompt()" class="bg-blue-600 px-6 py-2 rounded-xl text-xs font-black">+ MASA EKLE</button>
                </div>
                <div id="tableGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 text-center"></div>
            </div>

            <div id="view-inventory" class="hidden glass rounded-[40px] p-8 max-w-xl mx-auto border-b-8 border-blue-600 shadow-2xl">
                <h2 class="text-center text-3xl font-black mb-8 italic text-blue-500">Stok Yönetimi</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-2 mb-1 block">Ürün Adı</label>
                        <input type="text" id="invName" class="w-full bg-slate-900 p-4 rounded-2xl border border-slate-800 outline-none focus:border-blue-500 font-bold">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-2 mb-1 block">Satış Fiyatı</label>
                        <input type="number" id="invPrice" class="w-full bg-slate-900 p-4 rounded-2xl border border-slate-800 outline-none focus:border-green-500 font-black text-green-400">
                    </div>
                    <button onclick="saveProduct()" class="w-full bg-blue-600 p-5 rounded-2xl font-black text-lg shadow-xl shadow-blue-500/10">VERİTABANINA KAYDET</button>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDoc, doc, setDoc, onSnapshot, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-SANA_AIT_ANAHTAR_BURAYA",
            authDomain: "ems-pos-b6c2c.firebaseapp.com",
            projectId: "ems-pos-b6c2c",
            storageBucket: "ems-pos-b6c2c.appspot.com",
            messagingSenderId: "36315570077",
            appId: "1:36315570077:web:8d76d47053e1f2516666ba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.cart = [];
        window.businessType = "";

        // KURULUM VE SAAT
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        window.finishSetup = (type) => {
            window.businessType = type;
            document.getElementById('setupScreen').classList.add('hidden');
            document.getElementById('mainUI').classList.remove('hidden');
            document.getElementById('modeBadge').innerText = type.toUpperCase() + " SİSTEMİ";
            if(type === 'Restoran' || type === 'Kafe') showView('tables');
            renderTables();
        };

        window.resetSetup = () => { location.reload(); };

        window.showView = (view) => {
            ['pos', 'tables', 'inventory', 'ledger'].forEach(v => document.getElementById(`view-${v}`)?.classList.add('hidden'));
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab', 'text-white'));
            document.querySelectorAll('nav button').forEach(b => b.classList.add('text-slate-500'));
            document.getElementById(`nav-${view}`).classList.add('active-tab', 'text-white');
        };

        // BARKOD & TERAZİ MANTIĞI
        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
            document.getElementById('barcodeInput').value = text;
            handleCode();
        });

        window.handleCode = async () => {
            const code = document.getElementById('barcodeInput').value;
            if(!code) return;

            // Terazi Barkodu Çözücü (Örn: 27 ile başlayanlar tartılı üründür)
            if(code.startsWith('27') && code.length === 13) {
                const itemCode = code.substring(2, 7);
                const weight = parseFloat(code.substring(7, 12)) / 1000;
                const snap = await getDoc(doc(db, "urunler", itemCode));
                if(snap.exists()) {
                    const d = snap.data();
                    window.cart.push({ name: d.ad, price: d.fiyat * weight, code: code, qty: weight + "kg" });
                    renderCart();
                }
            } else {
                const snap = await getDoc(doc(db, "urunler", code));
                if(snap.exists()) {
                    const d = snap.data();
                    window.cart.push({ name: d.ad, price: d.fiyat, code: code, qty: "1 Adet" });
                    renderCart();
                } else { alert("Ürün bulunamadı!"); }
            }
            document.getElementById('barcodeInput').value = "";
        };

        window.renderCart = () => {
            const list = document.getElementById('cartList');
            list.innerHTML = "";
            let total = 0;
            window.cart.forEach(i => {
                total += i.price;
                list.innerHTML += `<div class="glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-blue-600">
                    <div><p class="font-bold text-xs uppercase">${i.name}</p><p class="text-[9px] text-slate-500">${i.qty}</p></div>
                    <p class="font-black text-blue-400 text-sm">₺${i.price.toFixed(2)}</p>
                </div>`;
            });
            document.getElementById('cartTotal').innerText = "₺" + total.toFixed(2);
            document.getElementById('cartCount').innerText = window.cart.length + " Ürün";
        };

        window.addFastItem = (name, price) => {
            window.cart.push({ name: name, price: price, code: "HIZLI", qty: "1 Adet" });
            renderCart();
        };

        // RESTORAN / MASA MANTIĞI
        window.renderTables = async () => {
            const grid = document.getElementById('tableGrid');
            grid.innerHTML = "";
            const snap = await getDocs(collection(db, "masalar"));
            snap.forEach(doc => {
                const data = doc.data();
                const color = data.status === 'dolu' ? 'bg-orange-600' : 'bg-emerald-600';
                grid.innerHTML += `<div class="table-btn ${color} p-8 rounded-3xl shadow-xl flex flex-col items-center gap-2 cursor-pointer">
                    <span class="text-xs font-black">MASA ${data.no}</span>
                    <span class="text-[10px] opacity-80 italic">${data.total > 0 ? '₺'+data.total : 'BOŞ'}</span>
                </div>`;
            });
        };

        window.addTablePrompt = async () => {
            const no = prompt("Masa Numarası:");
            if(no) {
                await setDoc(doc(db, "masalar", "Masa"+no), { no: no, status: 'bos', total: 0 });
                renderTables();
            }
        };

        // STOK KAYIT
        window.saveProduct = async () => {
            const name = document.getElementById('invName').value;
            const price = document.getElementById('invPrice').value;
            const code = document.getElementById('barcodeInput').value || prompt("Barkod Okutun veya Yazın:");
            if(!name || !price || !code) return alert("Eksik bilgi!");
            await setDoc(doc(db, "urunler", code), { ad: name, fiyat: Number(price) });
            alert("Ürün Kaydedildi!");
            showView('pos');
        };

        window.completeSale = (method) => {
            if(window.cart.length === 0) return;
            alert(`${method} ile satış tamamlandı!`);
            window.cart = [];
            renderCart();
        };

    </script>
</body>
</html>
