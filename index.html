<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMS POS PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Syncopate&family=Plus+Jakarta+Sans&display=swap" rel="stylesheet">

<style>
body { background:#0a0a0a; color:white; font-family:'Plus Jakarta Sans'; }
.title { font-family:'Syncopate'; }
.neon { color:#00eaff; }
</style>
</head>

<body class="p-4">

<h1 class="title text-2xl neon mb-4">EMS POS PRO</h1>

<!-- AUTH -->
<div id="authBox">
<input id="email" placeholder="Email" class="w-full p-2 mb-2 bg-gray-800">
<input id="pass" type="password" placeholder="Şifre" class="w-full p-2 mb-2 bg-gray-800">
<select id="sektor" class="w-full p-2 mb-2 bg-gray-800">
<option value="market">Market</option>
<option value="restoran">Restoran</option>
<option value="manav">Manav</option>
</select>
<button onclick="register()" class="bg-blue-600 w-full p-2 mb-2">Kayıt</button>
<button onclick="login()" class="bg-green-600 w-full p-2">Giriş</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<!-- ÜST BAR -->
<div class="flex justify-between mb-4">
<div id="welcome"></div>
<button onclick="logout()" class="bg-red-600 p-2">Çıkış</button>
</div>

<!-- MARKET -->
<div id="marketUI" class="hidden">

<input id="barkod" placeholder="Barkod okut" class="p-2 bg-gray-800 w-full mb-2" onkeyup="scan(event)">

<ul id="sepet" class="mb-2"></ul>
<div id="toplam" class="text-xl mb-2">0₺</div>

<button onclick="odeme('nakit')" class="bg-green-500 p-2">Nakit</button>
<button onclick="odeme('kart')" class="bg-blue-500 p-2">Kart</button>
<button onclick="odeme('veresiye')" class="bg-yellow-500 p-2">Veresiye</button>

</div>

<!-- ADMIN -->
<div id="adminUI" class="hidden mt-6">
<h3 class="text-xl mb-2">Admin Panel</h3>
<div id="onayList"></div>
</div>

<!-- XLSX -->
<input type="file" id="excel" class="mt-4">

</div>

<!-- FOOTER -->
<div class="fixed bottom-2 left-2 text-xs text-gray-500">
Software by Emirhan Bozdayı - Tüm Hakları Saklıdır
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
collection,
getDocs,
addDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "API_KEY",
authDomain: "ems-pos-b6c2c.firebaseapp.com",
projectId: "ems-pos-b6c2c",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// REGISTER
window.register = async () => {
const user = await createUserWithEmailAndPassword(auth, email.value, pass.value);

await setDoc(doc(db,"isletmeler",user.user.uid),{
email:email.value,
sektor:sektor.value,
onay:false,
role:"user"
});
alert("Onay Bekleniyor");
};

// LOGIN
window.login = async () => {
const user = await signInWithEmailAndPassword(auth, email.value, pass.value);

const snap = await getDoc(doc(db,"isletmeler",user.user.uid));
const data = snap.data();

if(!data.onay){ alert("Onay Bekleniyor"); return; }

startApp(user.user.uid,data);
};

// START
function startApp(uid,data){
authBox.classList.add("hidden");
app.classList.remove("hidden");

welcome.innerText = data.email;

if(data.sektor==="market") marketUI.classList.remove("hidden");

if(data.role==="admin") loadOnay();
}

// LOGOUT
window.logout = ()=> signOut(auth);

// SEPET
let cart=[];
let total=0;

// BARKOD
window.scan = async (e)=>{
if(e.key!=="Enter") return;

let code = barkod.value;

// TERAZİ
if(code.startsWith("27")){
let urunKod = code.substring(2,7);
let kilo = parseInt(code.substring(7,12))/1000;

const q = await getDocs(collection(db,"urunler"));
q.forEach(docu=>{
if(docu.data().barkod===urunKod){
let fiyat = docu.data().fiyat*kilo;
cart.push({ad:docu.data().ad,fiyat});
total+=fiyat;
}
});
}else{
const q = await getDocs(collection(db,"urunler"));
q.forEach(docu=>{
if(docu.data().barkod===code){
cart.push(docu.data());
total+=docu.data().fiyat;
}
});
}

renderCart();
barkod.value="";
};

// CART RENDER
function renderCart(){
sepet.innerHTML="";
cart.forEach(i=>{
sepet.innerHTML+=`<li>${i.ad} - ${i.fiyat}₺</li>`;
});
toplam.innerText=total+"₺";
}

// SATIŞ
window.odeme = async (tip)=>{
await addDoc(collection(db,"satislar"),{
cart,
total,
tip,
date:new Date()
});
cart=[];
total=0;
renderCart();
alert("Satış kaydedildi");
};

// ADMIN ONAY
async function loadOnay(){
adminUI.classList.remove("hidden");

const q = await getDocs(collection(db,"isletmeler"));
q.forEach(d=>{
if(!d.data().onay){
onayList.innerHTML+=`
<div class="bg-gray-800 p-2 mb-1">
${d.data().email}
<button onclick="onayla('${d.id}')" class="bg-green-500 p-1">Onayla</button>
</div>`;
}
});
}

window.onayla = async(id)=>{
await setDoc(doc(db,"isletmeler",id),{onay:true},{merge:true});
location.reload();
};

// EXCEL IMPORT
excel.onchange = (e)=>{
const file = e.target.files[0];
const reader = new FileReader();

reader.onload = async (evt)=>{
const wb = XLSX.read(evt.target.result,{type:"binary"});
const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

for(let item of data){
await addDoc(collection(db,"urunler"),item);
}
alert("Yüklendi");
};

reader.readAsBinaryString(file);
};

</script>

</body>
</html>
